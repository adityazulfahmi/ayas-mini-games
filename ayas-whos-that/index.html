<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Who's That, Aya? 🐰</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg1: #fce4ec;
      --bg2: #ede7f6;
      --btn-primary: #f06292;
      --text-main: #6a1b9a;
      --text-sub: #9c4dcc;
      --shadow: 0 4px 20px rgba(156, 77, 204, 0.18);
      --silhouette: #2d1b3d;
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ── TITLE SCREEN ── */
    #title-screen {
      text-align: center;
      max-width: 420px;
      width: 100%;
      animation: fadeIn 0.6s ease;
    }

    .game-logo {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 8vw, 3.2rem);
      color: var(--text-main);
      line-height: 1.15;
      text-shadow: 2px 3px 0 #f8bbd0, 4px 6px 0 rgba(206,147,216,0.3);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: clamp(0.9rem, 3.5vw, 1.05rem);
      color: var(--text-sub);
      font-weight: 600;
      margin-bottom: 36px;
    }

    .title-silhouette {
      width: 130px;
      height: 160px;
      margin: 0 auto 36px;
      filter: drop-shadow(0 8px 24px rgba(45,27,61,0.25));
      animation: pulse 2.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .start-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, #f06292, #ce93d8);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.45rem;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(240,98,146,0.4);
      transition: all 0.2s ease;
    }

    .start-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(240,98,146,0.5);
    }

    /* ── GAME SCREEN ── */
    #game-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.5s ease;
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 18px;
      gap: 10px;
    }

    .game-title-small {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(0.95rem, 4vw, 1.15rem);
      color: var(--text-main);
    }

    .score-box {
      display: flex;
      align-items: center;
      gap: 5px;
      background: white;
      border-radius: 14px;
      padding: 7px 14px;
      box-shadow: var(--shadow);
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: var(--text-main);
    }

    .menu-btn {
      padding: 7px 14px;
      border: 2px solid var(--btn-primary);
      border-radius: 14px;
      background: white;
      color: var(--btn-primary);
      font-family: 'Fredoka One', cursive;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .menu-btn:hover { background: var(--btn-primary); color: white; }

    .progress-bar-wrap {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .progress-label {
      font-family: 'Fredoka One', cursive;
      font-size: 0.9rem;
      color: var(--text-sub);
      white-space: nowrap;
    }

    .progress-dots {
      display: flex;
      gap: 6px;
    }

    .progress-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e1bee7;
      transition: background 0.3s;
    }

    .progress-dot.done { background: #f06292; }
    .progress-dot.current { background: #ce93d8; box-shadow: 0 0 0 3px rgba(206,147,216,0.35); }

    /* ── SILHOUETTE CARD ── */
    .silhouette-card {
      width: 100%;
      background: white;
      border-radius: 24px;
      padding: 28px 24px 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 16px;
      position: relative;
    }

    .question-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 18px;
    }

    .silhouette-wrap {
      width: 150px;
      height: 185px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      filter: drop-shadow(0 6px 16px rgba(45,27,61,0.2));
    }

    .silhouette-wrap svg {
      width: 100%;
      height: 100%;
    }

    /* ── COUNTDOWN BAR ── */
    .countdown-track {
      width: 100%;
      height: 10px;
      background: #f3e5f5;
      border-radius: 10px;
      overflow: hidden;
    }

    .countdown-bar {
      height: 100%;
      width: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, #ef5350 0%, #f06292 40%, #ce93d8 100%);
      transition: width 5s linear;
      transform-origin: left;
    }

    /* ── OPTIONS GRID ── */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }

    .option-btn {
      padding: 14px 10px;
      border: 2.5px solid #e1bee7;
      border-radius: 16px;
      background: white;
      color: var(--text-main);
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1rem, 4vw, 1.2rem);
      cursor: pointer;
      transition: all 0.18s ease;
      box-shadow: 0 2px 8px rgba(156,77,204,0.1);
      position: relative;
      overflow: hidden;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--btn-primary);
      background: #fce4ec;
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(240,98,146,0.25);
    }

    .option-btn:disabled { cursor: default; }

    .option-btn.correct {
      background: #e8f5e9;
      border-color: #66bb6a;
      color: #2e7d32;
      box-shadow: 0 0 0 3px rgba(102,187,106,0.3);
      animation: correctPop 0.35s ease;
    }

    .option-btn.wrong {
      background: #ffebee;
      border-color: #ef5350;
      color: #c62828;
      animation: shake 0.35s ease;
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.07); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    /* ── RESULTS SCREEN ── */
    #results-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 380px;
      animation: fadeIn 0.5s ease;
    }

    .results-card {
      background: white;
      border-radius: 28px;
      padding: clamp(28px, 6vw, 44px);
      text-align: center;
      box-shadow: 0 12px 48px rgba(156,77,204,0.2);
      width: 100%;
      animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }

    .result-emoji { font-size: 3.8rem; margin-bottom: 10px; }

    .result-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.6rem, 6vw, 2.1rem);
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .result-msg {
      color: var(--text-sub);
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 22px;
    }

    .stars-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      font-size: 2.4rem;
      margin-bottom: 28px;
    }

    .star-item { animation: starPop 0.4s ease backwards; }
    .star-item:nth-child(2) { animation-delay: 0.12s; }
    .star-item:nth-child(3) { animation-delay: 0.24s; }

    @keyframes starPop {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0); opacity: 1; }
    }

    .result-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-again {
      padding: 13px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #f06292, #ce93d8);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(240,98,146,0.4);
      transition: all 0.2s;
    }

    .btn-again:hover { transform: translateY(-2px); }

    .btn-menu-res {
      padding: 13px;
      border: 2px solid #ce93d8;
      border-radius: 16px;
      background: white;
      color: var(--text-main);
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-menu-res:hover { background: #ede7f6; }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.75); }
      to   { opacity: 1; transform: scale(1); }
    }

    .star-confetti {
      position: fixed;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 99;
    }

    @keyframes fall {
      from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      to   { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- TITLE SCREEN -->
  <div id="title-screen">
    <div class="game-logo">🐰 Who's That, Aya?</div>
    <div class="subtitle">Can you guess the Bing character from the shadow? 🌟</div>

    <!-- teaser silhouette: Bing -->
    <div class="title-silhouette">
      <svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
        <!-- Bing silhouette -->
        <ellipse cx="50" cy="90" rx="26" ry="32" fill="#2d1b3d"/>
        <circle cx="50" cy="55" r="20" fill="#2d1b3d"/>
        <!-- left ear -->
        <ellipse cx="37" cy="28" rx="7" ry="18" fill="#2d1b3d" transform="rotate(-8,37,28)"/>
        <!-- right ear -->
        <ellipse cx="63" cy="28" rx="7" ry="18" fill="#2d1b3d" transform="rotate(8,63,28)"/>
        <!-- legs -->
        <ellipse cx="40" cy="120" rx="9" ry="7" fill="#2d1b3d"/>
        <ellipse cx="60" cy="120" rx="9" ry="7" fill="#2d1b3d"/>
        <!-- arms -->
        <ellipse cx="22" cy="85" rx="6" ry="10" fill="#2d1b3d" transform="rotate(-15,22,85)"/>
        <ellipse cx="78" cy="85" rx="6" ry="10" fill="#2d1b3d" transform="rotate(15,78,85)"/>
        <!-- question mark overlay -->
        <text x="50" y="65" font-size="22" text-anchor="middle" fill="rgba(255,255,255,0.15)" font-family="Fredoka One, cursive">?</text>
      </svg>
    </div>

    <button class="start-btn" id="start-btn">Let's Guess! 🎉</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <div class="game-header">
      <div class="game-title-small">🐰 Who's That?</div>
      <div class="score-box">⭐ <span id="score-display">0</span></div>
      <button class="menu-btn" id="menu-btn">↩ Menu</button>
    </div>

    <div class="progress-bar-wrap">
      <span class="progress-label">Round</span>
      <div class="progress-dots" id="progress-dots">
        <div class="progress-dot current"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
      </div>
    </div>

    <div class="silhouette-card">
      <div class="question-label">Who is this Bing character?</div>
      <div class="silhouette-wrap" id="silhouette-wrap"></div>
      <div class="countdown-track">
        <div class="countdown-bar" id="countdown-bar"></div>
      </div>
    </div>

    <div class="options-grid" id="options-grid"></div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results-screen">
    <div class="results-card">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <div class="result-title" id="result-title">Great job!</div>
      <div class="result-msg" id="result-msg">You got 3 out of 3!</div>
      <div class="stars-row" id="stars-row"></div>
      <div class="result-actions">
        <button class="btn-again" id="play-again-btn">Play Again</button>
        <button class="btn-menu-res" id="menu-res-btn">Menu</button>
      </div>
    </div>
  </div>

  <script>
    // ── CHARACTERS ──
    const CHARACTERS = [
      { name: 'Bing',   silhouette: silhouetteBing()   },
      { name: 'Flop',   silhouette: silhouetteFlop()   },
      { name: 'Sula',   silhouette: silhouetteSula()   },
      { name: 'Pando',  silhouette: silhouettePando()  },
      { name: 'Coco',   silhouette: silhouetteCoco()   },
      { name: 'Charlie',silhouette: silhouetteCharlie()},
      { name: 'Padget', silhouette: silhouettePadget() },
      { name: 'Amma',   silhouette: silhouetteAmma()   },
    ];

    // ── SVG SILHOUETTES ──
    function silhouetteBing() {
      return `<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="90" rx="26" ry="32" fill="#2d1b3d"/>
        <circle cx="50" cy="55" r="20" fill="#2d1b3d"/>
        <ellipse cx="37" cy="27" rx="7" ry="19" fill="#2d1b3d" transform="rotate(-8,37,27)"/>
        <ellipse cx="63" cy="27" rx="7" ry="19" fill="#2d1b3d" transform="rotate(8,63,27)"/>
        <ellipse cx="40" cy="121" rx="9" ry="7" fill="#2d1b3d"/>
        <ellipse cx="60" cy="121" rx="9" ry="7" fill="#2d1b3d"/>
        <ellipse cx="22" cy="85" rx="6" ry="11" fill="#2d1b3d" transform="rotate(-15,22,85)"/>
        <ellipse cx="78" cy="85" rx="6" ry="11" fill="#2d1b3d" transform="rotate(15,78,85)"/>
      </svg>`;
    }

    function silhouetteFlop() {
      // Rag doll: big round bald head, no ears, long floppy limbs, small body
      return `<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="40" r="26" fill="#2d1b3d"/>
        <ellipse cx="50" cy="82" rx="16" ry="20" fill="#2d1b3d"/>
        <!-- long floppy arms -->
        <ellipse cx="18" cy="88" rx="7" ry="18" fill="#2d1b3d" transform="rotate(20,18,88)"/>
        <ellipse cx="82" cy="88" rx="7" ry="18" fill="#2d1b3d" transform="rotate(-20,82,88)"/>
        <!-- legs -->
        <ellipse cx="40" cy="115" rx="7" ry="14" fill="#2d1b3d" transform="rotate(8,40,115)"/>
        <ellipse cx="60" cy="115" rx="7" ry="14" fill="#2d1b3d" transform="rotate(-8,60,115)"/>
      </svg>`;
    }

    function silhouetteSula() {
      // Elephant: huge fan ears on sides, trunk hanging down, stocky body
      return `<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="85" rx="28" ry="30" fill="#2d1b3d"/>
        <circle cx="50" cy="52" r="20" fill="#2d1b3d"/>
        <!-- huge fan ears -->
        <ellipse cx="18" cy="55" rx="16" ry="22" fill="#2d1b3d"/>
        <ellipse cx="82" cy="55" rx="16" ry="22" fill="#2d1b3d"/>
        <!-- trunk -->
        <rect x="44" y="68" width="12" height="28" rx="6" fill="#2d1b3d"/>
        <ellipse cx="50" cy="98" rx="8" ry="5" fill="#2d1b3d"/>
        <!-- legs -->
        <rect x="30" y="110" width="12" height="18" rx="6" fill="#2d1b3d"/>
        <rect x="58" y="110" width="12" height="18" rx="6" fill="#2d1b3d"/>
      </svg>`;
    }

    function silhouettePando() {
      // Panda/bear: small round ears on top, wide round face, stocky body
      return `<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="88" rx="28" ry="34" fill="#2d1b3d"/>
        <circle cx="50" cy="52" r="23" fill="#2d1b3d"/>
        <!-- small bear ears on top -->
        <circle cx="33" cy="33" r="10" fill="#2d1b3d"/>
        <circle cx="67" cy="33" r="10" fill="#2d1b3d"/>
        <!-- stubby arms -->
        <ellipse cx="20" cy="88" rx="8" ry="12" fill="#2d1b3d" transform="rotate(-10,20,88)"/>
        <ellipse cx="80" cy="88" rx="8" ry="12" fill="#2d1b3d" transform="rotate(10,80,88)"/>
        <!-- legs -->
        <ellipse cx="39" cy="120" rx="10" ry="8" fill="#2d1b3d"/>
        <ellipse cx="61" cy="120" rx="10" ry="8" fill="#2d1b3d"/>
      </svg>`;
    }

    function silhouetteCoco() {
      // Bunny like Bing but shorter ears and slightly wider/rounder
      return `<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="92" rx="28" ry="30" fill="#2d1b3d"/>
        <circle cx="50" cy="58" r="22" fill="#2d1b3d"/>
        <!-- shorter, wider ears -->
        <ellipse cx="38" cy="33" rx="9" ry="15" fill="#2d1b3d" transform="rotate(-5,38,33)"/>
        <ellipse cx="62" cy="33" rx="9" ry="15" fill="#2d1b3d" transform="rotate(5,62,33)"/>
        <!-- legs -->
        <ellipse cx="39" cy="121" rx="10" ry="7" fill="#2d1b3d"/>
        <ellipse cx="61" cy="121" rx="10" ry="7" fill="#2d1b3d"/>
        <!-- arms -->
        <ellipse cx="20" cy="88" rx="7" ry="10" fill="#2d1b3d" transform="rotate(-10,20,88)"/>
        <ellipse cx="80" cy="88" rx="7" ry="10" fill="#2d1b3d" transform="rotate(10,80,88)"/>
      </svg>`;
    }

    function silhouetteCharlie() {
      // Very tiny baby — small everything, no ears visible, very compact
      return `<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="98" rx="18" ry="22" fill="#2d1b3d"/>
        <circle cx="50" cy="70" r="16" fill="#2d1b3d"/>
        <!-- tiny ears -->
        <ellipse cx="40" cy="57" rx="5" ry="11" fill="#2d1b3d" transform="rotate(-8,40,57)"/>
        <ellipse cx="60" cy="57" rx="5" ry="11" fill="#2d1b3d" transform="rotate(8,60,57)"/>
        <!-- chubby tiny arms -->
        <ellipse cx="29" cy="95" rx="5" ry="8" fill="#2d1b3d" transform="rotate(-10,29,95)"/>
        <ellipse cx="71" cy="95" rx="5" ry="8" fill="#2d1b3d" transform="rotate(10,71,95)"/>
        <!-- legs -->
        <ellipse cx="42" cy="119" rx="7" ry="6" fill="#2d1b3d"/>
        <ellipse cx="58" cy="119" rx="7" ry="6" fill="#2d1b3d"/>
      </svg>`;
    }

    function silhouettePadget() {
      // Tall adult with round helmet/hat on head — taller proportions
      return `<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
        <!-- body tall -->
        <ellipse cx="50" cy="95" rx="20" ry="35" fill="#2d1b3d"/>
        <!-- head -->
        <circle cx="50" cy="52" r="17" fill="#2d1b3d"/>
        <!-- helmet on top — distinctive round dome -->
        <ellipse cx="50" cy="37" rx="22" ry="14" fill="#2d1b3d"/>
        <rect x="28" y="38" width="44" height="8" rx="2" fill="#2d1b3d"/>
        <!-- arms -->
        <ellipse cx="25" cy="90" rx="6" ry="18" fill="#2d1b3d" transform="rotate(-8,25,90)"/>
        <ellipse cx="75" cy="90" rx="6" ry="18" fill="#2d1b3d" transform="rotate(8,75,90)"/>
        <!-- legs -->
        <rect x="33" y="124" width="12" height="14" rx="5" fill="#2d1b3d"/>
        <rect x="55" y="124" width="12" height="14" rx="5" fill="#2d1b3d"/>
      </svg>`;
    }

    function silhouetteAmma() {
      // Tall adult female, distinctive hair bun on top of head
      return `<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
        <!-- body -->
        <ellipse cx="50" cy="95" rx="21" ry="34" fill="#2d1b3d"/>
        <!-- head -->
        <circle cx="50" cy="56" r="18" fill="#2d1b3d"/>
        <!-- hair bun on top — very distinctive -->
        <circle cx="50" cy="35" r="11" fill="#2d1b3d"/>
        <circle cx="50" cy="28" r="8" fill="#2d1b3d"/>
        <!-- arms -->
        <ellipse cx="25" cy="92" rx="6" ry="17" fill="#2d1b3d" transform="rotate(-6,25,92)"/>
        <ellipse cx="75" cy="92" rx="6" ry="17" fill="#2d1b3d" transform="rotate(6,75,92)"/>
        <!-- legs -->
        <rect x="34" y="123" width="11" height="14" rx="5" fill="#2d1b3d"/>
        <rect x="55" y="123" width="11" height="14" rx="5" fill="#2d1b3d"/>
      </svg>`;
    }

    // ── AUDIO ──
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function getAudio() {
      if (!audioCtx) audioCtx = new AudioCtx();
      return audioCtx;
    }

    function playTone(freq, duration, type = 'sine', vol = 0.15, delay = 0) {
      try {
        const ctx = getAudio();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + duration + 0.05);
      } catch(e) {}
    }

    function soundCorrect() {
      playTone(523, 0.18, 'sine', 0.16);
      playTone(784, 0.28, 'sine', 0.16, 0.18);
    }

    function soundWrong() {
      playTone(300, 0.18, 'sine', 0.14);
      playTone(220, 0.28, 'sine', 0.12, 0.18);
    }

    function soundTimeout() {
      playTone(250, 0.3, 'sine', 0.12);
    }

    function soundWin() {
      playTone(523, 0.18, 'sine', 0.16);
      playTone(659, 0.18, 'sine', 0.16, 0.18);
      playTone(784, 0.18, 'sine', 0.16, 0.36);
      playTone(1047, 0.45, 'sine', 0.16, 0.54);
    }

    // ── STATE ──
    let roundChars = [];
    let questionIndex = 0;
    let score = 0;
    let answered = false;
    let countdownTimer = null;

    // ── SETUP ──
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('menu-btn').addEventListener('click', goToMenu);
    document.getElementById('menu-res-btn').addEventListener('click', goToMenu);
    document.getElementById('play-again-btn').addEventListener('click', startGame);

    function goToMenu() {
      clearTimeout(countdownTimer);
      show('title-screen');
      hide('game-screen');
      hide('results-screen');
    }

    function startGame() {
      score = 0;
      questionIndex = 0;
      roundChars = shuffle([...CHARACTERS]).slice(0, 3);
      document.getElementById('score-display').textContent = '0';
      hide('title-screen');
      hide('results-screen');
      show('game-screen');
      loadQuestion();
    }

    // ── QUESTION ──
    function loadQuestion() {
      answered = false;
      clearTimeout(countdownTimer);

      const char = roundChars[questionIndex];
      const options = buildOptions(char);

      // Update progress dots
      const dots = document.querySelectorAll('.progress-dot');
      dots.forEach((d, i) => {
        d.className = 'progress-dot';
        if (i < questionIndex) d.classList.add('done');
        else if (i === questionIndex) d.classList.add('current');
      });

      // Silhouette
      document.getElementById('silhouette-wrap').innerHTML = char.silhouette;

      // Options
      const grid = document.getElementById('options-grid');
      grid.innerHTML = '';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt.name;
        btn.addEventListener('click', () => onAnswer(opt.name, char.name, btn));
        grid.appendChild(btn);
      });

      // Countdown bar
      const bar = document.getElementById('countdown-bar');
      bar.style.transition = 'none';
      bar.style.width = '100%';

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          bar.style.transition = 'width 5s linear';
          bar.style.width = '0%';
        });
      });

      countdownTimer = setTimeout(() => onTimeout(char.name), 5000);
    }

    function buildOptions(correct) {
      const wrong = shuffle(CHARACTERS.filter(c => c.name !== correct.name)).slice(0, 3);
      return shuffle([correct, ...wrong]);
    }

    // ── ANSWER ──
    function onAnswer(chosen, correct, btn) {
      if (answered) return;
      answered = true;
      clearTimeout(countdownTimer);

      // Stop countdown bar instantly
      const bar = document.getElementById('countdown-bar');
      const computed = window.getComputedStyle(bar).width;
      bar.style.transition = 'none';
      bar.style.width = computed;

      disableOptions();

      if (chosen === correct) {
        btn.classList.add('correct');
        score++;
        document.getElementById('score-display').textContent = score;
        soundCorrect();
      } else {
        btn.classList.add('wrong');
        highlightCorrect(correct);
        soundWrong();
      }

      setTimeout(nextQuestion, 950);
    }

    function onTimeout(correct) {
      if (answered) return;
      answered = true;
      disableOptions();
      highlightCorrect(correct);
      soundTimeout();
      setTimeout(nextQuestion, 950);
    }

    function disableOptions() {
      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    }

    function highlightCorrect(correctName) {
      document.querySelectorAll('.option-btn').forEach(b => {
        if (b.textContent === correctName) b.classList.add('correct');
      });
    }

    function nextQuestion() {
      questionIndex++;
      if (questionIndex >= 3) {
        showResults();
      } else {
        loadQuestion();
      }
    }

    // ── RESULTS ──
    function showResults() {
      hide('game-screen');
      show('results-screen');

      // Mark all dots done
      document.querySelectorAll('.progress-dot').forEach(d => {
        d.className = 'progress-dot done';
      });

      const starsRow = document.getElementById('stars-row');
      starsRow.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const s = document.createElement('span');
        s.className = 'star-item';
        s.textContent = i < score ? '⭐' : '🌑';
        starsRow.appendChild(s);
      }

      const configs = [
        { emoji: '💪', title: 'Keep trying!',   msg: `You got ${score} out of 3. Practice makes perfect!` },
        { emoji: '💪', title: 'Keep trying!',   msg: `You got ${score} out of 3. Practice makes perfect!` },
        { emoji: '🌸', title: 'So close!',      msg: `${score} out of 3 — you almost got it! 🎀` },
        { emoji: '🎉', title: 'Perfect score!', msg: 'You got all 3! Amazing, Aya! 🌟' },
      ];
      const cfg = configs[score];
      document.getElementById('result-emoji').textContent = cfg.emoji;
      document.getElementById('result-title').textContent = cfg.title;
      document.getElementById('result-msg').textContent = cfg.msg;

      if (score === 3) {
        soundWin();
        launchConfetti();
      }
    }

    // ── HELPERS ──
    function show(id) {
      const el = document.getElementById(id);
      el.style.display = 'flex';
    }

    function hide(id) {
      const el = document.getElementById(id);
      el.style.display = 'none';
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function launchConfetti() {
      const emojis = ['🌸','⭐','🎀','✨','🌟','💖','🎊','🐰'];
      for (let i = 0; i < 26; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'star-confetti';
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          el.style.left = Math.random() * 100 + 'vw';
          el.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
          const dur = 2.4 + Math.random() * 2;
          el.style.animationDuration = dur + 's';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), dur * 1000 + 100);
        }, i * 85);
      }
    }
  </script>
</body>
</html>
