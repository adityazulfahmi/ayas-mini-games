<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#ede7f6"/>
    </linearGradient>
    <linearGradient id="ttt-strike" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  style="stop-color:#f06292"/>
      <stop offset="100%" style="stop-color:#ce93d8"/>
    </linearGradient>
    <radialGradient id="ttt-spot" cx="50%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#80cbc4" stop-opacity="0.55"/>
      <stop offset="100%" style="stop-color:#80cbc4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>

  <!-- Row 1 — three cats win the row -->
  <ellipse cx="160" cy="48" rx="124" ry="20" fill="url(#ttt-spot)"/>

  <rect x="48"  y="14" width="68" height="68" rx="14" fill="#e0f7fa" stroke="#80cbc4" stroke-width="3" filter="drop-shadow(0 5px 10px rgba(128,203,196,0.32))"/>
  <ellipse cx="64" cy="24" rx="13" ry="5" fill="white" opacity="0.85"/>
  <text x="82" y="62" font-size="36" text-anchor="middle">🐱</text>

  <rect x="126" y="14" width="68" height="68" rx="14" fill="#e0f7fa" stroke="#80cbc4" stroke-width="3" filter="drop-shadow(0 5px 10px rgba(128,203,196,0.32))"/>
  <ellipse cx="142" cy="24" rx="13" ry="5" fill="white" opacity="0.85"/>
  <text x="160" y="62" font-size="36" text-anchor="middle">🐱</text>

  <rect x="204" y="14" width="68" height="68" rx="14" fill="#e0f7fa" stroke="#80cbc4" stroke-width="3" filter="drop-shadow(0 5px 10px rgba(128,203,196,0.32))"/>
  <ellipse cx="220" cy="24" rx="13" ry="5" fill="white" opacity="0.85"/>
  <text x="238" y="62" font-size="36" text-anchor="middle">🐱</text>

  <!-- Row 2 — bunnies + a cat -->
  <rect x="48"  y="92" width="68" height="68" rx="14" fill="white" stroke="#ce93d8" stroke-width="2" filter="drop-shadow(0 3px 8px rgba(156,77,204,0.16))"/>
  <ellipse cx="64" cy="102" rx="13" ry="4.5" fill="white" opacity="0.7"/>
  <text x="82" y="140" font-size="36" text-anchor="middle">🐰</text>

  <rect x="126" y="92" width="68" height="68" rx="14" fill="white" stroke="#ce93d8" stroke-width="2" filter="drop-shadow(0 3px 8px rgba(156,77,204,0.16))"/>
  <ellipse cx="142" cy="102" rx="13" ry="4.5" fill="white" opacity="0.7"/>
  <text x="160" y="140" font-size="36" text-anchor="middle">🐱</text>

  <rect x="204" y="92" width="68" height="68" rx="14" fill="white" stroke="#ce93d8" stroke-width="2" filter="drop-shadow(0 3px 8px rgba(156,77,204,0.16))"/>
  <ellipse cx="220" cy="102" rx="13" ry="4.5" fill="white" opacity="0.7"/>
  <text x="238" y="140" font-size="36" text-anchor="middle">🐰</text>

  <!-- Strike line -->
  <line x1="40" y1="48" x2="280" y2="48" stroke="url(#ttt-strike)" stroke-width="8" stroke-linecap="round" opacity="0.95"/>
  <line x1="40" y1="48" x2="280" y2="48" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <text x="22"  y="74" font-size="14" fill="#9c4dcc" opacity="0.85">✨</text>
  <text x="290" y="74" font-size="14" fill="#9c4dcc" opacity="0.85">✨</text>
  <text x="160" y="174" font-size="13" fill="#ce93d8" opacity="0.85">✨</text>
</svg>
