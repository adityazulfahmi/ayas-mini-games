<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#ede7f6"/>
    </linearGradient>
    <radialGradient id="ch-target" cx="35%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#a5d6a7"/>
      <stop offset="100%" style="stop-color:#43a047"/>
    </radialGradient>
    <radialGradient id="ch-lens" cx="35%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" style="stop-color:#ffffff" stop-opacity="0.05"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>

  <!-- Target chip -->
  <g>
    <circle cx="64" cy="54" r="36" fill="#9c4dcc" opacity="0.08"/>
    <circle cx="64" cy="54" r="32" fill="#80cbc4" opacity="0.18"/>
    <circle cx="64" cy="54" r="26" fill="url(#ch-target)" stroke="white" stroke-width="4"/>
    <ellipse cx="56" cy="44" rx="9" ry="4" fill="white" opacity="0.7"/>
    <text x="64" y="104" font-family="Fredoka One, system-ui, sans-serif" font-size="11" font-weight="700" fill="#9c4dcc" text-anchor="middle" opacity="0.85">find this!</text>
  </g>

  <!-- Answer cards -->
  <rect x="152" y="22" width="68" height="62" rx="14" fill="white" stroke="#ce93d8" stroke-width="2.5" filter="drop-shadow(0 3px 7px rgba(156,77,204,0.13))"/>
  <ellipse cx="166" cy="32" rx="13" ry="4.5" fill="white" opacity="0.7"/>
  <text x="186" y="64" font-size="32" text-anchor="middle">🍎</text>

  <rect x="228" y="22" width="68" height="62" rx="14" fill="#e0f7fa" stroke="#80cbc4" stroke-width="3" filter="drop-shadow(0 3px 7px rgba(156,77,204,0.13))"/>
  <ellipse cx="242" cy="32" rx="13" ry="4.5" fill="white" opacity="0.7"/>
  <text x="262" y="64" font-size="32" text-anchor="middle">🐢</text>

  <rect x="152" y="96" width="68" height="62" rx="14" fill="white" stroke="#ce93d8" stroke-width="2.5" filter="drop-shadow(0 3px 7px rgba(156,77,204,0.13))"/>
  <ellipse cx="166" cy="106" rx="13" ry="4.5" fill="white" opacity="0.7"/>
  <text x="186" y="138" font-size="32" text-anchor="middle">🍇</text>

  <rect x="228" y="96" width="68" height="62" rx="14" fill="white" stroke="#ce93d8" stroke-width="2.5" filter="drop-shadow(0 3px 7px rgba(156,77,204,0.13))"/>
  <ellipse cx="242" cy="106" rx="13" ry="4.5" fill="white" opacity="0.7"/>
  <text x="262" y="138" font-size="32" text-anchor="middle">🍋</text>

  <!-- Magnifying glass over the turtle -->
  <g transform="rotate(-22 262 54)">
    <circle cx="262" cy="54" r="30" fill="white" opacity="0.4"/>
    <circle cx="262" cy="54" r="30" fill="url(#ch-lens)"/>
    <circle cx="262" cy="54" r="30" fill="none" stroke="#6a1b9a" stroke-width="4"/>
    <circle cx="262" cy="54" r="30" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="285" y1="76" x2="312" y2="105" stroke="#6a1b9a" stroke-width="6" stroke-linecap="round"/>
    <line x1="285" y1="76" x2="312" y2="105" stroke="#9c4dcc" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text x="116" y="120" font-size="14" fill="#ce93d8" opacity="0.7">✨</text>
  <text x="20"  y="156" font-size="12" fill="#9c4dcc" opacity="0.7">✨</text>
</svg>
