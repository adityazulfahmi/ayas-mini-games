<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#ede7f6"/>
    </linearGradient>
    <radialGradient id="ooo-spot" cx="50%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#80cbc4" stop-opacity="0.55"/>
      <stop offset="100%" style="stop-color:#80cbc4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>

  <!-- Category chip -->
  <rect x="116" y="10" width="88" height="22" rx="11" fill="white" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="124" y="26" font-size="11" text-anchor="start">🐾</text>
  <text x="160" y="26" font-family="Fredoka One, system-ui, sans-serif" font-size="11" font-weight="700" fill="#9c4dcc" text-anchor="middle">ANIMALS</text>

  <!-- 2x2 grid -->
  <rect x="20"  y="44" width="68" height="60" rx="14" fill="white" stroke="#ce93d8" stroke-width="2" filter="drop-shadow(0 3px 7px rgba(156,77,204,0.13))"/>
  <ellipse cx="36" cy="54" rx="13" ry="4.5" fill="white" opacity="0.7"/>
  <text x="54" y="84" font-size="32" text-anchor="middle">🐱</text>

  <rect x="98"  y="44" width="68" height="60" rx="14" fill="white" stroke="#ce93d8" stroke-width="2" filter="drop-shadow(0 3px 7px rgba(156,77,204,0.13))"/>
  <ellipse cx="114" cy="54" rx="13" ry="4.5" fill="white" opacity="0.7"/>
  <text x="132" y="84" font-size="32" text-anchor="middle">🐶</text>

  <rect x="20"  y="112" width="68" height="60" rx="14" fill="white" stroke="#ce93d8" stroke-width="2" filter="drop-shadow(0 3px 7px rgba(156,77,204,0.13))"/>
  <ellipse cx="36" cy="122" rx="13" ry="4.5" fill="white" opacity="0.7"/>
  <text x="54" y="152" font-size="32" text-anchor="middle">🐸</text>

  <!-- Odd one -->
  <ellipse cx="132" cy="142" rx="58" ry="36" fill="url(#ooo-spot)"/>
  <rect x="98"  y="112" width="68" height="60" rx="14" fill="#e0f7fa" stroke="#80cbc4" stroke-width="3.5" filter="drop-shadow(0 5px 9px rgba(128,203,196,0.32))"/>
  <ellipse cx="114" cy="122" rx="13" ry="5" fill="white" opacity="0.85"/>
  <text x="132" y="152" font-size="34" text-anchor="middle">🚗</text>

  <!-- Magnifier "?" badge -->
  <g transform="translate(238 78)">
    <circle cx="0" cy="0" r="22" fill="white" stroke="#9c4dcc" stroke-width="3"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="white" stroke-width="1"/>
    <line x1="16" y1="16" x2="34" y2="34" stroke="#9c4dcc" stroke-width="5" stroke-linecap="round"/>
    <text x="0" y="6" font-family="Fredoka One, system-ui, sans-serif" font-size="20" font-weight="700" fill="#9c4dcc" text-anchor="middle">?</text>
  </g>
  <text x="248" y="148" font-family="Fredoka One, system-ui, sans-serif" font-size="11" font-weight="700" fill="#9c4dcc" text-anchor="middle" opacity="0.85">spot it!</text>

  <text x="76"  y="124" font-size="13" fill="#80cbc4" opacity="0.85">✨</text>
  <text x="178" y="118" font-size="13" fill="#80cbc4" opacity="0.85">✨</text>
</svg>
