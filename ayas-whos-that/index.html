<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Who's That, Aya? 🐰</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg1: #fce4ec;
      --bg2: #ede7f6;
      --btn-primary: #f06292;
      --text-main: #6a1b9a;
      --text-sub: #9c4dcc;
      --shadow: 0 4px 20px rgba(156, 77, 204, 0.18);
      --silhouette: #2d1b3d;
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ── TITLE SCREEN ── */
    #title-screen {
      text-align: center;
      max-width: 420px;
      width: 100%;
      animation: fadeIn 0.6s ease;
    }

    .game-logo {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 8vw, 3.2rem);
      color: var(--text-main);
      line-height: 1.15;
      text-shadow: 2px 3px 0 #f8bbd0, 4px 6px 0 rgba(206,147,216,0.3);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: clamp(0.9rem, 3.5vw, 1.05rem);
      color: var(--text-sub);
      font-weight: 600;
      margin-bottom: 36px;
    }

    .title-silhouette {
      width: 130px;
      height: 160px;
      margin: 0 auto 36px;
      animation: pulse 2.5s ease infinite;
    }

    .title-silhouette img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: brightness(0) drop-shadow(0 8px 24px rgba(45,27,61,0.25));
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .start-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, #f06292, #ce93d8);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.45rem;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(240,98,146,0.4);
      transition: all 0.2s ease;
    }

    .start-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(240,98,146,0.5);
    }

    /* ── GAME SCREEN ── */
    #game-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.5s ease;
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 18px;
      gap: 10px;
    }

    .game-title-small {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(0.95rem, 4vw, 1.15rem);
      color: var(--text-main);
    }

    .score-box {
      display: flex;
      align-items: center;
      gap: 5px;
      background: white;
      border-radius: 14px;
      padding: 7px 14px;
      box-shadow: var(--shadow);
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: var(--text-main);
    }

    .menu-btn {
      padding: 7px 14px;
      border: 2px solid var(--btn-primary);
      border-radius: 14px;
      background: white;
      color: var(--btn-primary);
      font-family: 'Fredoka One', cursive;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .menu-btn:hover { background: var(--btn-primary); color: white; }

    .progress-bar-wrap {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .progress-label {
      font-family: 'Fredoka One', cursive;
      font-size: 0.9rem;
      color: var(--text-sub);
      white-space: nowrap;
    }

    .progress-dots {
      display: flex;
      gap: 6px;
    }

    .progress-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e1bee7;
      transition: background 0.3s;
    }

    .progress-dot.done { background: #f06292; }
    .progress-dot.current { background: #ce93d8; box-shadow: 0 0 0 3px rgba(206,147,216,0.35); }

    /* ── SILHOUETTE CARD ── */
    .silhouette-card {
      width: 100%;
      background: white;
      border-radius: 24px;
      padding: 28px 24px 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 16px;
      position: relative;
    }

    .question-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 18px;
    }

    .silhouette-wrap {
      width: 160px;
      height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      filter: drop-shadow(0 6px 16px rgba(45,27,61,0.2));
    }

    .silhouette-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: brightness(0);
      transition: filter 0.4s ease;
    }

    .silhouette-wrap.revealed img {
      filter: brightness(1);
    }

    /* ── COUNTDOWN BAR ── */
    .countdown-track {
      width: 100%;
      height: 10px;
      background: #f3e5f5;
      border-radius: 10px;
      overflow: hidden;
    }

    .countdown-bar {
      height: 100%;
      width: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, #ef5350 0%, #f06292 40%, #ce93d8 100%);
      transition: width 10s linear;
      transform-origin: left;
    }

    /* ── OPTIONS GRID ── */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }

    .option-btn {
      padding: 14px 10px;
      border: 2.5px solid #e1bee7;
      border-radius: 16px;
      background: white;
      color: var(--text-main);
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1rem, 4vw, 1.2rem);
      cursor: pointer;
      transition: all 0.18s ease;
      box-shadow: 0 2px 8px rgba(156,77,204,0.1);
      position: relative;
      overflow: hidden;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--btn-primary);
      background: #fce4ec;
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(240,98,146,0.25);
    }

    .option-btn:disabled { cursor: default; }

    .option-btn.correct {
      background: #e8f5e9;
      border-color: #66bb6a;
      color: #2e7d32;
      box-shadow: 0 0 0 3px rgba(102,187,106,0.3);
      animation: correctPop 0.35s ease;
    }

    .option-btn.wrong {
      background: #ffebee;
      border-color: #ef5350;
      color: #c62828;
      animation: shake 0.35s ease;
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.07); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    /* ── RESULTS SCREEN ── */
    #results-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 380px;
      animation: fadeIn 0.5s ease;
    }

    .results-card {
      background: white;
      border-radius: 28px;
      padding: clamp(28px, 6vw, 44px);
      text-align: center;
      box-shadow: 0 12px 48px rgba(156,77,204,0.2);
      width: 100%;
      animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }

    .result-emoji { font-size: 3.8rem; margin-bottom: 10px; }

    .result-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.6rem, 6vw, 2.1rem);
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .result-msg {
      color: var(--text-sub);
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 22px;
    }

    .stars-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      font-size: 2.4rem;
      margin-bottom: 28px;
    }

    .star-item { animation: starPop 0.4s ease backwards; }
    .star-item:nth-child(2) { animation-delay: 0.12s; }
    .star-item:nth-child(3) { animation-delay: 0.24s; }

    @keyframes starPop {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0); opacity: 1; }
    }

    .result-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-again {
      padding: 13px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #f06292, #ce93d8);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(240,98,146,0.4);
      transition: all 0.2s;
    }

    .btn-again:hover { transform: translateY(-2px); }

    .btn-menu-res {
      padding: 13px;
      border: 2px solid #ce93d8;
      border-radius: 16px;
      background: white;
      color: var(--text-main);
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-menu-res:hover { background: #ede7f6; }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.75); }
      to   { opacity: 1; transform: scale(1); }
    }

    .star-confetti {
      position: fixed;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 99;
    }

    @keyframes fall {
      from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      to   { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- TITLE SCREEN -->
  <div id="title-screen">
    <div class="game-logo">🐰 Who's That, Aya?</div>
    <div class="subtitle">Can you guess the Bing character from the shadow? 🌟</div>

    <!-- teaser silhouette: Bing -->
    <div class="title-silhouette">
      <img src="images/bing.png" alt="mystery character" />
    </div>

    <button class="start-btn" id="start-btn">Let's Guess! 🎉</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <div class="game-header">
      <div class="game-title-small">🐰 Who's That?</div>
      <div class="score-box">⭐ <span id="score-display">0</span></div>
      <button class="menu-btn" id="menu-btn">↩ Menu</button>
    </div>

    <div class="progress-bar-wrap">
      <span class="progress-label">Round</span>
      <div class="progress-dots" id="progress-dots">
        <div class="progress-dot current"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
      </div>
    </div>

    <div class="silhouette-card">
      <div class="question-label">Who is this Bing character?</div>
      <div class="silhouette-wrap" id="silhouette-wrap"></div>
      <div class="countdown-track">
        <div class="countdown-bar" id="countdown-bar"></div>
      </div>
    </div>

    <div class="options-grid" id="options-grid"></div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results-screen">
    <div class="results-card">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <div class="result-title" id="result-title">Great job!</div>
      <div class="result-msg" id="result-msg">You got 3 out of 3!</div>
      <div class="stars-row" id="stars-row"></div>
      <div class="result-actions">
        <button class="btn-again" id="play-again-btn">Play Again</button>
        <button class="btn-menu-res" id="menu-res-btn">Menu</button>
      </div>
    </div>
  </div>

  <script>
    // ── CHARACTERS ──
    const CHARACTERS = [
      { name: 'Bing',    image: 'images/bing.png'    },
      { name: 'Flop',    image: 'images/flop.png'    },
      { name: 'Sula',    image: 'images/sula.png'    },
      { name: 'Pando',   image: 'images/pando.png'   },
      { name: 'Coco',    image: 'images/coco.png'    },
      { name: 'Charlie', image: 'images/charlie.png' },
      { name: 'Padget',  image: 'images/padget.png'  },
      { name: 'Amma',    image: 'images/amma.png'    },
      { name: 'Molly',   image: 'images/molly.png'   },
      { name: 'Nicky',   image: 'images/nicky.png'   },
    ];

    // ── AUDIO ──
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function getAudio() {
      if (!audioCtx) audioCtx = new AudioCtx();
      return audioCtx;
    }

    function playTone(freq, duration, type = 'sine', vol = 0.15, delay = 0) {
      try {
        const ctx = getAudio();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + duration + 0.05);
      } catch(e) {}
    }

    function soundCorrect() {
      playTone(523, 0.18, 'sine', 0.16);
      playTone(784, 0.28, 'sine', 0.16, 0.18);
    }

    function soundWrong() {
      playTone(300, 0.18, 'sine', 0.14);
      playTone(220, 0.28, 'sine', 0.12, 0.18);
    }

    function soundTimeout() {
      playTone(250, 0.3, 'sine', 0.12);
    }

    function soundWin() {
      playTone(523, 0.18, 'sine', 0.16);
      playTone(659, 0.18, 'sine', 0.16, 0.18);
      playTone(784, 0.18, 'sine', 0.16, 0.36);
      playTone(1047, 0.45, 'sine', 0.16, 0.54);
    }

    // ── STATE ──
    let roundChars = [];
    let questionIndex = 0;
    let score = 0;
    let answered = false;
    let countdownTimer = null;

    // ── SETUP ──
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('menu-btn').addEventListener('click', goToMenu);
    document.getElementById('menu-res-btn').addEventListener('click', goToMenu);
    document.getElementById('play-again-btn').addEventListener('click', startGame);

    function goToMenu() {
      clearTimeout(countdownTimer);
      show('title-screen');
      hide('game-screen');
      hide('results-screen');
    }

    function startGame() {
      score = 0;
      questionIndex = 0;
      roundChars = shuffle([...CHARACTERS]).slice(0, 3);
      document.getElementById('score-display').textContent = '0';
      hide('title-screen');
      hide('results-screen');
      show('game-screen');
      loadQuestion();
    }

    // ── QUESTION ──
    function loadQuestion() {
      answered = false;
      clearTimeout(countdownTimer);

      const char = roundChars[questionIndex];
      const options = buildOptions(char);

      // Update progress dots
      const dots = document.querySelectorAll('.progress-dot');
      dots.forEach((d, i) => {
        d.className = 'progress-dot';
        if (i < questionIndex) d.classList.add('done');
        else if (i === questionIndex) d.classList.add('current');
      });

      // Silhouette
      const wrap = document.getElementById('silhouette-wrap');
      wrap.classList.remove('revealed');
      wrap.innerHTML = '';
      const img = document.createElement('img');
      img.src = char.image;
      img.alt = 'mystery character';
      wrap.appendChild(img);

      // Options
      const grid = document.getElementById('options-grid');
      grid.innerHTML = '';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt.name;
        btn.addEventListener('click', () => onAnswer(opt.name, char.name, btn));
        grid.appendChild(btn);
      });

      // Countdown bar
      const bar = document.getElementById('countdown-bar');
      bar.style.transition = 'none';
      bar.style.width = '100%';

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          bar.style.transition = 'width 10s linear';
          bar.style.width = '0%';
        });
      });

      countdownTimer = setTimeout(() => onTimeout(char.name), 10000);
    }

    function buildOptions(correct) {
      const wrong = shuffle(CHARACTERS.filter(c => c.name !== correct.name)).slice(0, 3);
      return shuffle([correct, ...wrong]);
    }

    // ── ANSWER ──
    function onAnswer(chosen, correct, btn) {
      if (answered) return;
      answered = true;
      clearTimeout(countdownTimer);

      // Stop countdown bar instantly
      const bar = document.getElementById('countdown-bar');
      const computed = window.getComputedStyle(bar).width;
      bar.style.transition = 'none';
      bar.style.width = computed;

      disableOptions();
      document.getElementById('silhouette-wrap').classList.add('revealed');

      if (chosen === correct) {
        btn.classList.add('correct');
        score++;
        document.getElementById('score-display').textContent = score;
        soundCorrect();
      } else {
        btn.classList.add('wrong');
        highlightCorrect(correct);
        soundWrong();
      }

      setTimeout(nextQuestion, 950);
    }

    function onTimeout(correct) {
      if (answered) return;
      answered = true;
      disableOptions();
      document.getElementById('silhouette-wrap').classList.add('revealed');
      highlightCorrect(correct);
      soundTimeout();
      setTimeout(nextQuestion, 950);
    }

    function disableOptions() {
      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    }

    function highlightCorrect(correctName) {
      document.querySelectorAll('.option-btn').forEach(b => {
        if (b.textContent === correctName) b.classList.add('correct');
      });
    }

    function nextQuestion() {
      questionIndex++;
      if (questionIndex >= 3) {
        showResults();
      } else {
        loadQuestion();
      }
    }

    // ── RESULTS ──
    function showResults() {
      hide('game-screen');
      show('results-screen');

      // Mark all dots done
      document.querySelectorAll('.progress-dot').forEach(d => {
        d.className = 'progress-dot done';
      });

      const starsRow = document.getElementById('stars-row');
      starsRow.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const s = document.createElement('span');
        s.className = 'star-item';
        s.textContent = i < score ? '⭐' : '🌑';
        starsRow.appendChild(s);
      }

      const configs = [
        { emoji: '💪', title: 'Keep trying!',   msg: `You got ${score} out of 3. Practice makes perfect!` },
        { emoji: '💪', title: 'Keep trying!',   msg: `You got ${score} out of 3. Practice makes perfect!` },
        { emoji: '🌸', title: 'So close!',      msg: `${score} out of 3 — you almost got it! 🎀` },
        { emoji: '🎉', title: 'Perfect score!', msg: 'You got all 3! Amazing, Aya! 🌟' },
      ];
      const cfg = configs[score];
      document.getElementById('result-emoji').textContent = cfg.emoji;
      document.getElementById('result-title').textContent = cfg.title;
      document.getElementById('result-msg').textContent = cfg.msg;

      if (score === 3) {
        soundWin();
        launchConfetti();
      }
    }

    // ── HELPERS ──
    function show(id) {
      const el = document.getElementById(id);
      // title-screen is a block div; game/results screens are flex containers
      el.style.display = id === 'title-screen' ? 'block' : 'flex';
    }

    function hide(id) {
      const el = document.getElementById(id);
      el.style.display = 'none';
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function launchConfetti() {
      const emojis = ['🌸','⭐','🎀','✨','🌟','💖','🎊','🐰'];
      for (let i = 0; i < 26; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'star-confetti';
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          el.style.left = Math.random() * 100 + 'vw';
          el.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
          const dur = 2.4 + Math.random() * 2;
          el.style.animationDuration = dur + 's';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), dur * 1000 + 100);
        }, i * 85);
      }
    }
  </script>
</body>
</html>
