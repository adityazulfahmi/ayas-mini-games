<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#ede7f6"/>
    </linearGradient>
    <radialGradient id="cm-target" cx="35%" cy="32%" r="65%">
      <stop offset="0%" style="stop-color:#ff8aaa"/>
      <stop offset="100%" style="stop-color:#f06292"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>

  <!-- Painter's palette -->
  <path d="M 90 52 Q 30 52 22 100 Q 16 138 50 154 Q 90 168 130 156 Q 178 144 184 110 Q 188 80 168 64 Q 140 44 90 52 Z"
        fill="white" stroke="#ce93d8" stroke-width="2.5"
        filter="drop-shadow(0 6px 14px rgba(156,77,204,0.20))"/>
  <ellipse cx="148" cy="116" rx="14" ry="10" fill="url(#bg)" stroke="#ce93d8" stroke-width="1.5"/>
  <circle cx="56"  cy="92"  r="13" fill="#4fc3f7"/>
  <circle cx="84"  cy="124" r="11" fill="#66bb6a"/>
  <circle cx="118" cy="86"  r="12" fill="#ce93d8"/>
  <circle cx="120" cy="142" r="10" fill="#ffd54f"/>
  <ellipse cx="52" cy="86" rx="5" ry="2.5" fill="white" opacity="0.65"/>
  <ellipse cx="80" cy="119" rx="4" ry="2"  fill="white" opacity="0.65"/>
  <ellipse cx="114" cy="80" rx="4.5" ry="2.2" fill="white" opacity="0.65"/>

  <!-- "MATCH THIS!" label pill, ABOVE the target swatch (where the brush
       can't reach) — sits in clear space between swatch and the top edge -->
  <g>
    <rect x="200" y="10" width="88" height="22" rx="11" fill="white" stroke="#ce93d8" stroke-width="1.5"/>
    <text x="244" y="26" font-family="Fredoka One, system-ui, sans-serif" font-size="11" font-weight="700" fill="#9c4dcc" text-anchor="middle">MATCH THIS!</text>
  </g>

  <!-- Target swatch — moved down slightly so the label pill above has room -->
  <circle cx="244" cy="80" r="40" fill="#80cbc4" opacity="0.22"/>
  <circle cx="244" cy="80" r="34" fill="url(#cm-target)" stroke="#80cbc4" stroke-width="3"/>
  <ellipse cx="234" cy="68" rx="11" ry="5" fill="white" opacity="0.85"/>

  <!-- Brush — points from palette toward target -->
  <g transform="rotate(-22 230 144)">
    <rect x="186" y="140" width="60" height="9" rx="2" fill="#a1887f"/>
    <rect x="244" y="138" width="14" height="13" rx="2" fill="#cfd8dc"/>
    <path d="M 258 136 L 282 134 L 282 154 L 258 152 Z" fill="#f06292"/>
    <path d="M 282 134 Q 295 144 282 154 Z" fill="#ec407a"/>
  </g>
  <!-- Paint drips beneath brush -->
  <circle cx="276" cy="170" r="3" fill="#f06292" opacity="0.7"/>
  <circle cx="288" cy="176" r="2" fill="#f06292" opacity="0.5"/>

  <!-- Sparkles -->
  <text x="296" y="60"  font-size="14" fill="#9c4dcc" opacity="0.85">✨</text>
  <text x="190" y="50"  font-size="12" fill="#ce93d8" opacity="0.85">✨</text>
</svg>
