<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aya's Colour Match 🎨</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg1: #fce4ec;
      --bg2: #ede7f6;
      --btn-primary: #f06292;
      --text-main: #6a1b9a;
      --text-sub: #9c4dcc;
      --match-glow: #80cbc4;
      --match-bg: #e0f7fa;
      --shadow: 0 4px 20px rgba(156, 77, 204, 0.18);
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ── TITLE SCREEN ── */
    #title-screen {
      text-align: center;
      max-width: 420px;
      width: 100%;
      animation: fadeIn 0.6s ease;
    }

    .game-logo {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.2rem, 8vw, 3.4rem);
      color: var(--text-main);
      line-height: 1.15;
      text-shadow: 2px 3px 0 #f8bbd0, 4px 6px 0 rgba(206,147,216,0.3);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      color: var(--text-sub);
      margin-bottom: 36px;
      font-weight: 600;
    }

    .colour-preview {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .preview-dot {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      box-shadow: var(--shadow);
      animation: bounce 1.8s ease infinite;
    }
    .preview-dot:nth-child(2) { animation-delay: 0.2s; }
    .preview-dot:nth-child(3) { animation-delay: 0.4s; }
    .preview-dot:nth-child(4) { animation-delay: 0.6s; }

    .start-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, #f06292, #ce93d8);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(240, 98, 146, 0.4);
      transition: all 0.2s ease;
    }

    .start-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(240, 98, 146, 0.5);
    }
    .start-btn:active { transform: translateY(0); }

    /* ── GAME SCREEN ── */
    #game-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.5s ease;
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 16px;
      gap: 10px;
    }

    .game-title-small {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1rem, 4vw, 1.15rem);
      color: var(--text-main);
      white-space: nowrap;
    }

    .stat-box {
      display: flex;
      align-items: center;
      gap: 5px;
      background: white;
      border-radius: 14px;
      padding: 8px 16px;
      box-shadow: var(--shadow);
      font-family: 'Fredoka One', cursive;
      font-size: 1.15rem;
      color: var(--text-main);
      white-space: nowrap;
    }

    .stat-box.timer-urgent {
      color: #e53935;
      animation: urgentPulse 0.6s ease infinite;
    }

    /* ── PROGRESS BAR ── */
    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(206,147,216,0.25);
      border-radius: 4px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f06292, #ce93d8);
      border-radius: 4px;
      transition: width 1s linear;
    }

    /* ── COLOUR BLOB ── */
    .question-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .colour-prompt {
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem;
      color: var(--text-sub);
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }

    .colour-blob {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.18),
        0 0 0 7px white,
        0 0 0 10px rgba(206,147,216,0.3);
      transition: background-color 0.25s ease;
    }

    .colour-blob.pop {
      animation: blobPop 0.3s ease;
    }

    /* ── ANSWER BUTTONS ── */
    .answers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
    }

    .answer-btn {
      aspect-ratio: 1;
      border: 5px solid white;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      box-shadow:
        0 4px 16px rgba(0,0,0,0.15),
        0 0 0 3px rgba(206,147,216,0.35);
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.06);
      box-shadow:
        0 8px 24px rgba(0,0,0,0.2),
        0 0 0 4px rgba(240,98,146,0.5);
    }

    .answer-btn.correct {
      box-shadow:
        0 0 0 5px var(--match-glow),
        0 6px 24px rgba(128,203,196,0.55);
      transform: scale(1.1);
    }

    .answer-btn.wrong {
      box-shadow:
        0 0 0 5px #f06292,
        0 4px 20px rgba(240,98,146,0.4);
      animation: shake 0.38s ease;
    }

    .answer-btn:disabled { cursor: default; }

    /* ── STREAK BADGE ── */
    .streak-badge {
      font-family: 'Fredoka One', cursive;
      font-size: 0.95rem;
      color: var(--text-sub);
      margin-bottom: 16px;
      min-height: 1.4rem;
      transition: opacity 0.3s;
    }

    .streak-badge.glow {
      color: #f06292;
      text-shadow: 0 0 8px rgba(240,98,146,0.4);
    }

    /* ── END OVERLAY ── */
    #end-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(243, 229, 245, 0.96);
      z-index: 100;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.4s ease;
    }

    #end-overlay.show { display: flex; }

    .end-card {
      background: white;
      border-radius: 28px;
      padding: clamp(28px, 6vw, 48px);
      text-align: center;
      box-shadow: 0 12px 48px rgba(156, 77, 204, 0.25);
      max-width: 360px;
      width: 90%;
      animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .end-emoji { font-size: 3.5rem; margin-bottom: 10px; }

    .end-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.5rem, 5vw, 2rem);
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .end-subtitle {
      color: var(--text-sub);
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .score-display {
      display: inline-block;
      background: linear-gradient(135deg, #fce4ec, #ede7f6);
      border-radius: 14px;
      padding: 14px 36px;
      font-family: 'Fredoka One', cursive;
      font-size: 2.4rem;
      color: var(--text-main);
      margin-bottom: 6px;
      box-shadow: var(--shadow);
    }

    .score-label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-sub);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
    }

    .play-again-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #f06292, #ce93d8);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.25rem;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(240, 98, 146, 0.4);
      transition: all 0.2s ease;
    }

    .play-again-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(240, 98, 146, 0.5);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.75); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      75% { transform: translateX(7px); }
    }

    @keyframes urgentPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    @keyframes blobPop {
      0% { transform: scale(1); }
      45% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* ── CONFETTI ── */
    .star {
      position: fixed;
      pointer-events: none;
      font-size: 1.4rem;
      animation: fall linear forwards;
      z-index: 99;
    }

    @keyframes fall {
      from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- TITLE SCREEN -->
  <div id="title-screen">
    <div class="game-logo">🎨 Colour Match</div>
    <div class="subtitle">Can you name all the colours? 🌈</div>

    <div class="colour-preview">
      <div class="preview-dot" style="background:#f06292"></div>
      <div class="preview-dot" style="background:#29b6f6"></div>
      <div class="preview-dot" style="background:#ffb300"></div>
      <div class="preview-dot" style="background:#66bb6a"></div>
    </div>

    <button class="start-btn" id="start-btn">Let's Play! 🎉</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <div class="game-header">
      <div class="game-title-small">🎨 Colour Match</div>
      <div class="stat-box" id="timer-box">⏱ <span id="timer-display">60</span>s</div>
      <div class="stat-box">⭐ <span id="score-display">0</span></div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:100%"></div>
    </div>

    <div class="streak-badge" id="streak-badge"></div>

    <div class="question-area">
      <div class="colour-prompt">Find the matching colour! 👇</div>
      <div class="colour-blob" id="colour-blob"></div>
    </div>

    <div class="answers-grid" id="answers-grid"></div>
  </div>

  <!-- END OVERLAY -->
  <div id="end-overlay">
    <div class="end-card">
      <div class="end-emoji" id="end-emoji">🎊</div>
      <div class="end-title" id="end-title">Amazing, Aya!</div>
      <div class="end-subtitle" id="end-subtitle">You're a colour superstar! 🌟</div>
      <div class="score-display" id="final-score">0</div>
      <span class="score-label">points</span>
      <button class="play-again-btn" id="play-again-btn">Play Again 🌸</button>
    </div>
  </div>

  <script>
    // ── COLOUR POOL ──
    const COLORS = [
      { name: 'Red',       hex: '#f44336' },
      { name: 'Orange',    hex: '#ff9800' },
      { name: 'Yellow',    hex: '#ffeb3b' },
      { name: 'Green',     hex: '#4caf50' },
      { name: 'Blue',      hex: '#2196f3' },
      { name: 'Purple',    hex: '#9c27b0' },
      { name: 'Pink',      hex: '#f06292' },
      { name: 'Brown',     hex: '#795548' },
      { name: 'Grey',      hex: '#9e9e9e' },
      { name: 'Teal',      hex: '#009688' },
      { name: 'Lime',      hex: '#8bc34a' },
      { name: 'Cyan',      hex: '#00bcd4' },
      { name: 'Indigo',    hex: '#3f51b5' },
      { name: 'Violet',    hex: '#673ab7' },
      { name: 'Coral',     hex: '#ff7043' },
      { name: 'Mint',      hex: '#80cbc4' },
      { name: 'Lavender',  hex: '#ce93d8' },
      { name: 'Gold',      hex: '#ffc107' },
      { name: 'Crimson',   hex: '#c62828' },
      { name: 'Turquoise', hex: '#26c6da' },
      { name: 'Magenta',   hex: '#e91e63' },
      { name: 'Olive',     hex: '#9ccc65' },
      { name: 'Salmon',    hex: '#ef9a9a' },
      { name: 'Sky Blue',  hex: '#4fc3f7' },
      { name: 'Rose',      hex: '#f48fb1' },
      { name: 'Forest',    hex: '#388e3c' },
      { name: 'Navy',      hex: '#1565c0' },
      { name: 'Peach',     hex: '#ffab91' },
      { name: 'Lilac',     hex: '#b39ddb' },
      { name: 'Lemon',     hex: '#fff176' },
    ];

    const GAME_DURATION = 60;

    let score = 0;
    let streak = 0;
    let timeLeft = GAME_DURATION;
    let timerInterval = null;
    let currentCorrect = null;
    let answering = false;

    // ── AUDIO ──
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function getAudio() {
      if (!audioCtx) audioCtx = new AudioCtx();
      return audioCtx;
    }

    function playTone(freq, duration, type = 'sine', vol = 0.18, delay = 0) {
      try {
        const ctx = getAudio();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + duration + 0.05);
      } catch (e) {}
    }

    function soundCorrect() {
      playTone(523, 0.18, 'sine', 0.16);
      playTone(659, 0.22, 'sine', 0.16, 0.18);
    }

    function soundStreak() {
      playTone(523, 0.15, 'sine', 0.16);
      playTone(659, 0.15, 'sine', 0.16, 0.15);
      playTone(784, 0.25, 'sine', 0.18, 0.30);
    }

    function soundWrong() {
      playTone(260, 0.25, 'sine', 0.1);
    }

    function soundEnd() {
      playTone(523, 0.22, 'sine', 0.18);
      playTone(659, 0.22, 'sine', 0.18, 0.22);
      playTone(784, 0.22, 'sine', 0.18, 0.44);
      playTone(1047, 0.5, 'sine', 0.18, 0.66);
    }

    // ── CONTROLS ──
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('play-again-btn').addEventListener('click', () => {
      document.getElementById('end-overlay').classList.remove('show');
      startGame();
    });

    function startGame() {
      score = 0;
      streak = 0;
      timeLeft = GAME_DURATION;
      answering = false;

      document.getElementById('title-screen').style.display = 'none';
      const gs = document.getElementById('game-screen');
      gs.style.display = 'flex';

      document.getElementById('score-display').textContent = '0';
      document.getElementById('timer-display').textContent = GAME_DURATION;
      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('timer-box').classList.remove('timer-urgent');
      document.getElementById('streak-badge').textContent = '';
      document.getElementById('streak-badge').classList.remove('glow');

      clearInterval(timerInterval);
      timerInterval = setInterval(tick, 1000);

      nextQuestion();
    }

    function tick() {
      timeLeft--;
      document.getElementById('timer-display').textContent = timeLeft;
      document.getElementById('progress-fill').style.width = (timeLeft / GAME_DURATION * 100) + '%';

      if (timeLeft <= 10) {
        document.getElementById('timer-box').classList.add('timer-urgent');
      }

      if (timeLeft <= 0) {
        endGame();
      }
    }

    // ── QUESTION ──
    function nextQuestion() {
      answering = false;

      const correctIdx = Math.floor(Math.random() * COLORS.length);
      currentCorrect = COLORS[correctIdx];

      const distractors = shuffle(COLORS.filter((_, i) => i !== correctIdx)).slice(0, 3);
      const options = shuffle([currentCorrect, ...distractors]);

      const blob = document.getElementById('colour-blob');
      blob.style.background = currentCorrect.hex;
      blob.classList.remove('pop');

      const grid = document.getElementById('answers-grid');
      grid.innerHTML = '';
      options.forEach(colour => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.style.background = colour.hex;
        btn.dataset.name = colour.name;
        btn.addEventListener('click', () => onAnswer(btn, colour));
        grid.appendChild(btn);
      });
    }

    function onAnswer(btn, chosen) {
      if (answering) return;
      answering = true;

      const allBtns = document.querySelectorAll('.answer-btn');
      allBtns.forEach(b => b.disabled = true);

      if (chosen.name === currentCorrect.name) {
        btn.classList.add('correct');
        streak++;
        score += streak >= 3 ? 15 : 10;
        document.getElementById('score-display').textContent = score;

        const blob = document.getElementById('colour-blob');
        blob.classList.add('pop');

        if (streak >= 3) {
          soundStreak();
          const badge = document.getElementById('streak-badge');
          badge.textContent = `🔥 ${streak} in a row! +15`;
          badge.classList.add('glow');
        } else {
          soundCorrect();
          const badge = document.getElementById('streak-badge');
          badge.textContent = streak === 2 ? '✨ One more for a streak!' : '';
          badge.classList.remove('glow');
        }

        setTimeout(nextQuestion, 850);
      } else {
        btn.classList.add('wrong');
        streak = 0;
        soundWrong();
        document.getElementById('streak-badge').textContent = '';
        document.getElementById('streak-badge').classList.remove('glow');

        allBtns.forEach(b => {
          if (b.dataset.name === currentCorrect.name) b.classList.add('correct');
        });

        setTimeout(nextQuestion, 1100);
      }
    }

    // ── END ──
    function endGame() {
      clearInterval(timerInterval);
      timerInterval = null;

      soundEnd();

      const s = score;
      let emoji, title, subtitle;
      if (s >= 120) {
        emoji = '🏆'; title = 'Colour Champion!'; subtitle = 'Aya knows ALL the colours! 🌈✨';
      } else if (s >= 80) {
        emoji = '🌟'; title = 'Brilliant, Aya!'; subtitle = 'You\'re a colour superstar! 🎨';
      } else if (s >= 40) {
        emoji = '🎀'; title = 'Well done, Aya!'; subtitle = 'Great colour matching! 💖';
      } else {
        emoji = '🌸'; title = 'Nice try, Aya!'; subtitle = 'Let\'s play again and learn more! 🌺';
      }

      document.getElementById('end-emoji').textContent = emoji;
      document.getElementById('end-title').textContent = title;
      document.getElementById('end-subtitle').textContent = subtitle;
      document.getElementById('final-score').textContent = s;
      document.getElementById('end-overlay').classList.add('show');

      if (s >= 80) launchConfetti();
    }

    // ── UTILS ──
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function launchConfetti() {
      const emojis = ['🌸','⭐','🎀','✨','🌟','💖','🎊','🌺','🎨','🌈'];
      for (let i = 0; i < 30; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'star';
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          el.style.left = Math.random() * 100 + 'vw';
          el.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
          const dur = 2.5 + Math.random() * 2;
          el.style.animationDuration = dur + 's';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), dur * 1000 + 100);
        }, i * 80);
      }
    }
  </script>
</body>
</html>
