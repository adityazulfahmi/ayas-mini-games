<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aya's Mini Games 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #fce4ec 0%, #ede7f6 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .logo {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.4rem, 9vw, 3.8rem);
      color: #6a1b9a;
      text-align: center;
      line-height: 1.15;
      text-shadow: 2px 3px 0 #f8bbd0, 4px 6px 0 rgba(206,147,216,0.3);
      margin-bottom: 8px;
    }

    .tagline {
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      color: #9c4dcc;
      font-weight: 600;
      text-align: center;
      margin-bottom: 48px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 580px;
    }

    .game-card {
      background: white;
      border-radius: 24px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 6px 24px rgba(156, 77, 204, 0.15);
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: block;
    }

    .game-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(156, 77, 204, 0.25);
    }

    .game-icon {
      font-size: 3.4rem;
      margin-bottom: 14px;
      display: block;
      animation: bounce 2s ease infinite;
    }

    .game-card:nth-child(2) .game-icon { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .game-name {
      font-family: 'Fredoka One', cursive;
      font-size: 1.4rem;
      color: #6a1b9a;
      margin-bottom: 8px;
    }

    .game-desc {
      font-size: 0.88rem;
      color: #9c4dcc;
      font-weight: 600;
      line-height: 1.5;
    }

    .play-badge {
      display: inline-block;
      margin-top: 18px;
      padding: 8px 22px;
      border-radius: 20px;
      background: linear-gradient(135deg, #f06292, #ce93d8);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      box-shadow: 0 4px 12px rgba(240, 98, 146, 0.35);
      transition: box-shadow 0.2s;
    }

    .game-card:hover .play-badge {
      box-shadow: 0 6px 18px rgba(240, 98, 146, 0.5);
    }

    footer {
      margin-top: 48px;
      font-size: 0.8rem;
      color: #ce93d8;
      font-weight: 600;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="logo">🌸 Aya's Mini Games</div>
  <div class="tagline">Pick a game and let's play! 🎀</div>

  <div class="games-grid">
    <a class="game-card" href="./ayas-flip-matching/">
      <span class="game-icon">🃏</span>
      <div class="game-name">Flip & Matching</div>
      <div class="game-desc">Flip cards and find matching pairs of fruits & animals. Choose 2×2 up to 6×6!</div>
      <span class="play-badge">Play Now 🎉</span>
    </a>

    <a class="game-card" href="./ayas-tictactoe/">
      <span class="game-icon">🐱</span>
      <div class="game-name">Tic-Tac-Toe</div>
      <div class="game-desc">🐱 vs 🐰 — two players battle it out on a classic 3×3 grid. May the best win!</div>
      <span class="play-badge">Play Now 🎉</span>
    </a>
  </div>

  <footer>Made with 💖 for Aya</footer>

</body>
</html>
