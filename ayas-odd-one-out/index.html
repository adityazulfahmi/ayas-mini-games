<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Which One Doesn't Belong? 🤔</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg1: #fce4ec;
      --bg2: #ede7f6;
      --text-main: #6a1b9a;
      --text-sub: #9c4dcc;
      --match-glow: #80cbc4;
      --match-bg: #e0f7fa;
      --shadow: 0 4px 20px rgba(156, 77, 204, 0.18);
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ── TITLE SCREEN ── */
    #title-screen {
      text-align: center;
      max-width: 420px;
      width: 100%;
      animation: fadeIn 0.6s ease;
    }

    .game-logo {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 7.5vw, 3.2rem);
      color: var(--text-main);
      line-height: 1.15;
      text-shadow: 2px 3px 0 #f8bbd0, 4px 6px 0 rgba(206,147,216,0.3);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: clamp(0.95rem, 3.5vw, 1.05rem);
      color: var(--text-sub);
      font-weight: 600;
      margin-bottom: 36px;
    }

    /* title preview: 3 same + 1 odd */
    .title-preview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      max-width: 240px;
      margin: 0 auto 40px;
    }

    .tp-card {
      background: white;
      border-radius: 16px;
      padding: 14px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      box-shadow: var(--shadow);
      animation: bounce 1.8s ease infinite;
    }
    .tp-card:nth-child(2) { animation-delay: 0.2s; }
    .tp-card:nth-child(3) { animation-delay: 0.4s; }
    .tp-card.odd {
      border: 3px solid #f06292;
      animation-delay: 0.6s;
    }

    .start-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, #f06292, #ce93d8);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(240, 98, 146, 0.4);
      transition: all 0.2s ease;
    }
    .start-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(240,98,146,0.5); }
    .start-btn:active { transform: translateY(0); }

    /* ── GAME SCREEN ── */
    #game-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.5s ease;
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 16px;
      gap: 10px;
    }

    .game-title-small {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(0.95rem, 3.8vw, 1.1rem);
      color: var(--text-main);
      white-space: nowrap;
    }

    .stat-box {
      display: flex;
      align-items: center;
      gap: 5px;
      background: white;
      border-radius: 14px;
      padding: 8px 16px;
      box-shadow: var(--shadow);
      font-family: 'Fredoka One', cursive;
      font-size: 1.15rem;
      color: var(--text-main);
      white-space: nowrap;
    }

    .stat-box.timer-urgent {
      color: #e53935;
      animation: urgentPulse 0.6s ease infinite;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(206,147,216,0.25);
      border-radius: 4px;
      margin-bottom: 18px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f06292, #ce93d8);
      border-radius: 4px;
      transition: width 1s linear;
    }

    .streak-badge {
      font-family: 'Fredoka One', cursive;
      font-size: 0.95rem;
      color: var(--text-sub);
      margin-bottom: 14px;
      min-height: 1.4rem;
    }

    .streak-badge.glow {
      color: #f06292;
      text-shadow: 0 0 8px rgba(240,98,146,0.4);
    }

    /* ── QUESTION ── */
    .question-area {
      margin-bottom: 20px;
      text-align: center;
    }

    .question-text {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.15rem, 5vw, 1.4rem);
      color: var(--text-main);
    }

    /* ── EMOJI GRID ── */
    .emoji-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
    }

    .emoji-btn {
      height: 128px;
      background: white;
      border: 3.5px solid rgba(206,147,216,0.3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.8rem;
      cursor: pointer;
      box-shadow: 0 3px 14px rgba(156,77,204,0.1);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      touch-action: manipulation;
      line-height: 1;
    }

    .emoji-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 8px 24px rgba(0,0,0,0.13);
      border-color: rgba(240,98,146,0.5);
    }

    .emoji-btn.correct {
      border-color: var(--match-glow);
      background: var(--match-bg);
      box-shadow: 0 0 0 4px var(--match-glow), 0 6px 22px rgba(128,203,196,0.4);
      transform: scale(1.06);
    }

    .emoji-btn.wrong {
      border-color: #f06292;
      background: #fff0f4;
      box-shadow: 0 0 0 4px #f06292, 0 4px 16px rgba(240,98,146,0.3);
      animation: shake 0.38s ease;
    }

    .emoji-btn:disabled { cursor: default; }

    /* ── END OVERLAY ── */
    #end-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(243, 229, 245, 0.96);
      z-index: 100;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.4s ease;
    }

    #end-overlay.show { display: flex; }

    .end-card {
      background: white;
      border-radius: 28px;
      padding: clamp(28px, 6vw, 48px);
      text-align: center;
      box-shadow: 0 12px 48px rgba(156,77,204,0.25);
      max-width: 360px;
      width: 90%;
      animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }

    .end-emoji { font-size: 3.5rem; margin-bottom: 10px; }

    .end-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.5rem, 5vw, 2rem);
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .end-subtitle {
      color: var(--text-sub);
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .score-display {
      display: inline-block;
      background: linear-gradient(135deg, #fce4ec, #ede7f6);
      border-radius: 14px;
      padding: 14px 36px;
      font-family: 'Fredoka One', cursive;
      font-size: 2.4rem;
      color: var(--text-main);
      margin-bottom: 6px;
      box-shadow: var(--shadow);
    }

    .score-label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-sub);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
    }

    .end-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .play-again-btn {
      padding: 14px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #f06292, #ce93d8);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(240,98,146,0.4);
      transition: all 0.2s ease;
    }

    .play-again-btn:hover { transform: translateY(-2px); }

    .btn-home {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      border: 2px solid #ce93d8;
      border-radius: 18px;
      background: white;
      color: var(--text-main);
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-home:hover { background: #ede7f6; }

    /* ── COMPACT FOR SMALL PHONES ── */
    @media (max-height: 680px) {
      .emoji-btn    { height: 100px; font-size: 3rem; border-radius: 16px; }
      .emoji-grid   { gap: 10px; }
      .question-area { margin-bottom: 12px; }
      .streak-badge  { margin-bottom: 8px; }
      .progress-bar  { margin-bottom: 12px; }
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.75); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-7px); }
      75%       { transform: translateX(7px); }
    }

    @keyframes urgentPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.06); }
    }

    .star {
      position: fixed;
      pointer-events: none;
      font-size: 1.4rem;
      animation: fall linear forwards;
      z-index: 99;
    }

    @keyframes fall {
      from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      to   { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- TITLE SCREEN -->
  <div id="title-screen">
    <div class="game-logo">🤔 Which One<br>Doesn't Belong?</div>
    <div class="subtitle">Find the one that doesn't fit with the others! 🌟</div>

    <div class="title-preview">
      <div class="tp-card">🐱</div>
      <div class="tp-card">🐶</div>
      <div class="tp-card">🐸</div>
      <div class="tp-card odd">🚗</div>
    </div>

    <button class="start-btn" id="start-btn">Let's Play! 🎉</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <div class="game-header">
      <div class="game-title-small">🤔 Odd One Out</div>
      <div class="stat-box" id="timer-box">⏱ <span id="timer-display">30</span>s</div>
      <div class="stat-box">⭐ <span id="score-display">0</span></div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:100%"></div>
    </div>

    <div class="streak-badge" id="streak-badge"></div>

    <div class="question-area">
      <div class="question-text">Which one doesn't belong? 🤔</div>
    </div>

    <div class="emoji-grid" id="emoji-grid"></div>
  </div>

  <!-- END OVERLAY -->
  <div id="end-overlay">
    <div class="end-card">
      <div class="end-emoji" id="end-emoji">🎊</div>
      <div class="end-title" id="end-title">Amazing, Aya!</div>
      <div class="end-subtitle" id="end-subtitle">You spotted them all! 🌟</div>
      <div class="score-display" id="final-score">0</div>
      <span class="score-label">points</span>
      <div class="end-actions">
        <button class="play-again-btn" id="play-again-btn">Play Again 🌸</button>
        <a class="btn-home" href="../">🏠 All Games</a>
      </div>
    </div>
  </div>

  <script>
    // ── CATEGORIES ──
    // Each has enough emojis to show 3 in a question without quick repeats.
    // Categories are kept clearly distinct so there's no ambiguity.
    const CATEGORIES = [
      { name: 'Animals',  emojis: ['🐱','🐶','🐸','🐼','🐨','🦊','🐯','🐮','🐷','🦁','🐧','🐢','🐬','🐘','🦒','🐇','🦅'] },
      { name: 'Fruits',   emojis: ['🍎','🍊','🍋','🍇','🍓','🍒','🍑','🍌','🍉','🍐','🫐','🥝','🍍','🥭'] },
      { name: 'Vehicles', emojis: ['🚗','🚕','✈️','🚀','🚌','🚂','🚁','⛵','🏎️','🚑','🚒','🛸'] },
      { name: 'Sweets',   emojis: ['🍦','🍰','🧁','🍩','🍪','🍫','🍬','🍭','🥧','🎂'] },
      { name: 'Flowers',  emojis: ['🌸','🌺','🌻','🌹','🌷','🌼','💐','🏵️'] },
      { name: 'Sports',   emojis: ['⚽','🏀','🏈','⚾','🎾','🏐','🎱','🏓','🥊','🎿','🏒'] },
      { name: 'Clothes',  emojis: ['👕','👖','👗','👔','👟','🧢','🎩','👒','🧣','🧤','🧦','👚'] },
      { name: 'Toys',     emojis: ['🎮','🎲','🪀','🧸','🪁','🎯','🎠','🧩','🪃','🎪'] },
    ];

    const GAME_DURATION = 30;

    let score = 0;
    let streak = 0;
    let timeLeft = GAME_DURATION;
    let timerInterval = null;
    let correctEmoji = null;
    let answering = false;
    let lastGroupIdx = -1;

    // ── AUDIO ──
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function getAudio() {
      if (!audioCtx) audioCtx = new AudioCtx();
      return audioCtx;
    }

    function playTone(freq, duration, type = 'sine', vol = 0.18, delay = 0) {
      try {
        const ctx = getAudio();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + duration + 0.05);
      } catch (e) {}
    }

    function soundCorrect() { playTone(523,0.18,'sine',0.16); playTone(659,0.22,'sine',0.16,0.18); }
    function soundStreak()  { playTone(523,0.15,'sine',0.16); playTone(659,0.15,'sine',0.16,0.15); playTone(784,0.25,'sine',0.18,0.30); }
    function soundWrong()   { playTone(260,0.25,'sine',0.1); }
    function soundEnd()     { playTone(523,0.22,'sine',0.18); playTone(659,0.22,'sine',0.18,0.22); playTone(784,0.22,'sine',0.18,0.44); playTone(1047,0.5,'sine',0.18,0.66); }

    // ── CONTROLS ──
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('play-again-btn').addEventListener('click', () => {
      document.getElementById('end-overlay').classList.remove('show');
      startGame();
    });

    function startGame() {
      score = 0; streak = 0; timeLeft = GAME_DURATION;
      answering = false; lastGroupIdx = -1;

      document.getElementById('title-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'flex';
      document.getElementById('score-display').textContent = '0';
      document.getElementById('timer-display').textContent = GAME_DURATION;
      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('timer-box').classList.remove('timer-urgent');
      document.getElementById('streak-badge').textContent = '';
      document.getElementById('streak-badge').classList.remove('glow');

      clearInterval(timerInterval);
      timerInterval = setInterval(tick, 1000);
      nextQuestion();
    }

    function tick() {
      timeLeft--;
      document.getElementById('timer-display').textContent = timeLeft;
      document.getElementById('progress-fill').style.width = (timeLeft / GAME_DURATION * 100) + '%';
      if (timeLeft <= 10) document.getElementById('timer-box').classList.add('timer-urgent');
      if (timeLeft <= 0) endGame();
    }

    // ── TAP HANDLER ──
    function addTapHandler(el, handler) {
      let startX, startY;
      el.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX; startY = e.touches[0].clientY;
      }, { passive: true });
      el.addEventListener('touchend', e => {
        const dx = Math.abs(e.changedTouches[0].clientX - startX);
        const dy = Math.abs(e.changedTouches[0].clientY - startY);
        if (dx < 12 && dy < 12) { e.preventDefault(); handler(); }
      });
      el.addEventListener('click', handler);
    }

    // ── QUESTION ──
    function nextQuestion() {
      answering = false;

      // Pick group category (no back-to-back repeat)
      let groupIdx;
      do { groupIdx = Math.floor(Math.random() * CATEGORIES.length); }
      while (groupIdx === lastGroupIdx);
      lastGroupIdx = groupIdx;

      const group = CATEGORIES[groupIdx];
      const groupThree = shuffle([...group.emojis]).slice(0, 3);

      // Pick odd-one from a different category
      const oddIdx = randomOtherIdx(groupIdx);
      const oddCat  = CATEGORIES[oddIdx];
      const odd     = oddCat.emojis[Math.floor(Math.random() * oddCat.emojis.length)];

      correctEmoji = odd;

      const options = shuffle([...groupThree, odd]);

      const grid = document.getElementById('emoji-grid');
      grid.innerHTML = '';
      options.forEach(em => {
        const btn = document.createElement('button');
        btn.className = 'emoji-btn';
        btn.textContent = em;
        btn.dataset.emoji = em;
        addTapHandler(btn, () => onAnswer(btn, em));
        grid.appendChild(btn);
      });
    }

    function onAnswer(btn, chosen) {
      if (answering) return;
      answering = true;

      document.querySelectorAll('.emoji-btn').forEach(b => b.disabled = true);

      if (chosen === correctEmoji) {
        btn.classList.add('correct');
        streak++;
        score += streak >= 3 ? 15 : 10;
        document.getElementById('score-display').textContent = score;

        const badge = document.getElementById('streak-badge');
        if (streak >= 3) {
          soundStreak();
          badge.textContent = `🔥 ${streak} in a row! +15`;
          badge.classList.add('glow');
        } else {
          soundCorrect();
          badge.textContent = streak === 2 ? '✨ One more for a streak!' : '';
          badge.classList.remove('glow');
        }

        setTimeout(nextQuestion, 900);
      } else {
        btn.classList.add('wrong');
        streak = 0;
        soundWrong();

        document.getElementById('streak-badge').textContent = '';
        document.getElementById('streak-badge').classList.remove('glow');

        // Reveal the correct one
        document.querySelectorAll('.emoji-btn').forEach(b => {
          if (b.dataset.emoji === correctEmoji) b.classList.add('correct');
        });

        setTimeout(nextQuestion, 1100);
      }
    }

    // ── END ──
    function endGame() {
      clearInterval(timerInterval);
      timerInterval = null;
      soundEnd();

      const s = score;
      let emoji, title, subtitle;
      if (s >= 60)      { emoji='🏆'; title='Super Spotter!';   subtitle='Aya finds every odd one out! 🌈✨'; }
      else if (s >= 40) { emoji='🌟'; title='Brilliant, Aya!';  subtitle='You\'ve got a great eye! 🔍';       }
      else if (s >= 20) { emoji='🎀'; title='Well done, Aya!';  subtitle='Great spotting! 💖';               }
      else              { emoji='🌸'; title='Nice try, Aya!';   subtitle='Let\'s play again! 🌺';            }

      document.getElementById('end-emoji').textContent = emoji;
      document.getElementById('end-title').textContent = title;
      document.getElementById('end-subtitle').textContent = subtitle;
      document.getElementById('final-score').textContent = s;
      document.getElementById('end-overlay').classList.add('show');

      if (s >= 40) launchConfetti();
    }

    // ── UTILS ──
    function randomOtherIdx(exclude) {
      let idx;
      do { idx = Math.floor(Math.random() * CATEGORIES.length); }
      while (idx === exclude);
      return idx;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function launchConfetti() {
      const emojis = ['🌸','⭐','🎀','✨','🌟','💖','🎊','🌺','🤔','🔍'];
      for (let i = 0; i < 30; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'star';
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          el.style.left = Math.random() * 100 + 'vw';
          el.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
          const dur = 2.5 + Math.random() * 2;
          el.style.animationDuration = dur + 's';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), dur * 1000 + 100);
        }, i * 80);
      }
    }
  </script>
</body>
</html>
