<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#ede7f6"/>
    </linearGradient>
    <linearGradient id="cardback" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ce93d8"/>
      <stop offset="100%" style="stop-color:#ba68c8"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>

  <!-- Matched pair (mint outline) -->
  <rect x="32"  y="40" width="68" height="68" rx="14" fill="#e0f7fa" stroke="#80cbc4" stroke-width="3" filter="drop-shadow(0 4px 8px rgba(156,77,204,0.18))"/>
  <ellipse cx="48" cy="52" rx="14" ry="5" fill="white" opacity="0.65"/>
  <text x="66" y="86" font-size="32" text-anchor="middle">🍓</text>

  <rect x="106" y="40" width="68" height="68" rx="14" fill="#e0f7fa" stroke="#80cbc4" stroke-width="3" filter="drop-shadow(0 4px 8px rgba(156,77,204,0.18))"/>
  <ellipse cx="122" cy="52" rx="14" ry="5" fill="white" opacity="0.65"/>
  <text x="140" y="86" font-size="32" text-anchor="middle">🍓</text>
  <line x1="100" y1="74" x2="106" y2="74" stroke="#80cbc4" stroke-width="3" stroke-linecap="round"/>

  <!-- Cat card (revealed) -->
  <rect x="184" y="40" width="60" height="68" rx="12" fill="white" stroke="#ce93d8" stroke-width="2" filter="drop-shadow(0 4px 8px rgba(156,77,204,0.18))"/>
  <ellipse cx="200" cy="52" rx="13" ry="5" fill="white" opacity="0.85"/>
  <text x="214" y="86" font-size="32" text-anchor="middle">🐱</text>
  <text x="180" y="34" font-size="14" fill="#9c4dcc" opacity="0.85">✨</text>

  <!-- Face-down card -->
  <rect x="252" y="40" width="60" height="68" rx="12" fill="url(#cardback)"/>
  <ellipse cx="266" cy="52" rx="12" ry="4.5" fill="white" opacity="0.4"/>
  <text x="282" y="86" font-size="22" text-anchor="middle" fill="white">✨</text>

  <!-- Bottom row of face-downs -->
  <rect x="48"  y="124" width="44" height="44" rx="9" fill="url(#cardback)" opacity="0.65"/>
  <text x="70"  y="154" font-size="18" text-anchor="middle" fill="white">✨</text>
  <rect x="100" y="124" width="44" height="44" rx="9" fill="url(#cardback)" opacity="0.65"/>
  <text x="122" y="154" font-size="18" text-anchor="middle" fill="white">✨</text>
  <rect x="152" y="124" width="44" height="44" rx="9" fill="url(#cardback)" opacity="0.65"/>
  <text x="174" y="154" font-size="18" text-anchor="middle" fill="white">✨</text>
  <rect x="204" y="124" width="44" height="44" rx="9" fill="url(#cardback)" opacity="0.65"/>
  <text x="226" y="154" font-size="18" text-anchor="middle" fill="white">✨</text>

  <text x="20"  y="34"  font-size="14" fill="#9c4dcc" opacity="0.85">✨</text>
  <text x="180" y="32"  font-size="13" fill="#ce93d8" opacity="0.85">✨</text>
  <text x="14"  y="118" font-size="12" fill="#ce93d8" opacity="0.6">✨</text>
</svg>
