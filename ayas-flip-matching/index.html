<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aya's Flip & Matching 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg1: #fce4ec;
      --bg2: #ede7f6;
      --card-back: #ce93d8;
      --card-back2: #ba68c8;
      --card-front: #fff8fc;
      --btn-primary: #f06292;
      --btn-hover: #e91e8c;
      --text-main: #6a1b9a;
      --text-sub: #9c4dcc;
      --match-glow: #80cbc4;
      --match-bg: #e0f7fa;
      --overlay-bg: rgba(243, 229, 245, 0.96);
      --shadow: 0 4px 20px rgba(156, 77, 204, 0.18);
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow-x: hidden;
    }

    /* ── TITLE SCREEN ── */
    #title-screen {
      text-align: center;
      max-width: 480px;
      width: 100%;
      animation: fadeIn 0.6s ease;
    }

    .game-logo {
      font-size: clamp(2.2rem, 8vw, 3.4rem);
      font-family: 'Fredoka One', cursive;
      color: var(--text-main);
      line-height: 1.15;
      text-shadow: 2px 3px 0 #f8bbd0, 4px 6px 0 rgba(206,147,216,0.3);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      color: var(--text-sub);
      margin-bottom: 36px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .card-preview {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .preview-card {
      width: 54px;
      height: 54px;
      border-radius: 12px;
      background: var(--card-back);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      box-shadow: var(--shadow);
      animation: bounce 1.8s ease infinite;
    }
    .preview-card:nth-child(2) { animation-delay: 0.2s; }
    .preview-card:nth-child(3) { animation-delay: 0.4s; }
    .preview-card:nth-child(4) { animation-delay: 0.6s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .section-label {
      font-size: 0.85rem;
      color: var(--text-sub);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    .size-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 32px;
    }

    .size-btn {
      padding: 12px 4px;
      border: 2.5px solid #ce93d8;
      border-radius: 14px;
      background: white;
      color: var(--text-main);
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(206,147,216,0.2);
    }

    .size-btn:hover {
      border-color: var(--btn-primary);
      background: #fce4ec;
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(240, 98, 146, 0.3);
    }

    .size-btn.active {
      background: var(--btn-primary);
      border-color: var(--btn-primary);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(240, 98, 146, 0.45);
    }

    .size-sub {
      display: block;
      font-family: 'Nunito', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      opacity: 0.8;
      margin-top: 3px;
    }

    .start-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, #f06292, #ce93d8);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(240, 98, 146, 0.4);
      transition: all 0.2s ease;
      letter-spacing: 0.03em;
    }

    .start-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(240, 98, 146, 0.5);
    }

    .start-btn:active { transform: translateY(0); }

    /* ── GAME SCREEN ── */
    #game-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 700px;
      animation: fadeIn 0.5s ease;
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 18px;
      gap: 10px;
    }

    .game-title-small {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1rem, 4vw, 1.3rem);
      color: var(--text-main);
      white-space: nowrap;
    }

    .timer-box {
      display: flex;
      align-items: center;
      gap: 6px;
      background: white;
      border-radius: 14px;
      padding: 8px 16px;
      box-shadow: var(--shadow);
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1rem, 4vw, 1.25rem);
      color: var(--text-main);
    }

    .timer-icon { font-size: 1.1em; }

    .restart-btn {
      padding: 8px 18px;
      border: 2px solid var(--btn-primary);
      border-radius: 14px;
      background: white;
      color: var(--btn-primary);
      font-family: 'Fredoka One', cursive;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .restart-btn:hover {
      background: var(--btn-primary);
      color: white;
      transform: translateY(-1px);
    }

    .match-counter {
      font-size: 0.85rem;
      color: var(--text-sub);
      font-weight: 700;
      margin-bottom: 12px;
      align-self: flex-end;
    }

    /* ── CARD GRID ── */
    #card-grid {
      display: grid;
      gap: clamp(8px, 2vw, 14px);
      width: 100%;
    }

    .card-wrapper {
      aspect-ratio: 1;
      perspective: 800px;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: clamp(10px, 2.5vw, 18px);
    }

    .card-wrapper.flipped .card,
    .card-wrapper.matched .card {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-back {
      background: linear-gradient(135deg, var(--card-back), var(--card-back2));
      box-shadow: 0 4px 14px rgba(156, 77, 204, 0.22);
      font-size: clamp(1.2rem, 4vw, 2rem);
      flex-direction: column;
      gap: 4px;
      transition: box-shadow 0.2s;
    }

    .card-wrapper:hover:not(.flipped):not(.matched) .card-back {
      box-shadow: 0 6px 20px rgba(240, 98, 146, 0.35);
    }

    .card-back-pattern {
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      opacity: 0.9;
    }

    .card-front {
      background: var(--card-front);
      transform: rotateY(180deg);
      font-size: clamp(1.5rem, 6vw, 3rem);
      box-shadow: 0 4px 14px rgba(156, 77, 204, 0.15);
    }

    .card-wrapper.matched .card-front {
      background: var(--match-bg);
      box-shadow: 0 0 0 3px var(--match-glow), 0 4px 16px rgba(128, 203, 196, 0.4);
    }

    /* ── WIN OVERLAY ── */
    #win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      z-index: 100;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.4s ease;
    }

    #win-overlay.show {
      display: flex;
    }

    .win-card {
      background: white;
      border-radius: 28px;
      padding: clamp(28px, 6vw, 48px);
      text-align: center;
      box-shadow: 0 12px 48px rgba(156, 77, 204, 0.25);
      max-width: 380px;
      width: 90%;
      animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .win-emoji { font-size: 4rem; margin-bottom: 10px; }

    .win-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.6rem, 6vw, 2.2rem);
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .win-subtitle {
      color: var(--text-sub);
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .win-time {
      display: inline-block;
      background: linear-gradient(135deg, #fce4ec, #ede7f6);
      border-radius: 14px;
      padding: 12px 28px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      color: var(--text-main);
      margin-bottom: 28px;
      box-shadow: var(--shadow);
    }

    .win-time-label {
      display: block;
      font-family: 'Nunito', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-sub);
      margin-bottom: 4px;
    }

    .win-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .play-again-btn {
      padding: 14px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #f06292, #ce93d8);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.15rem;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(240, 98, 146, 0.4);
      transition: all 0.2s ease;
    }

    .play-again-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(240, 98, 146, 0.5);
    }

    .btn-home {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      border: 2px solid #ce93d8;
      border-radius: 18px;
      background: white;
      color: var(--text-main);
      font-family: 'Fredoka One', cursive;
      font-size: 1.15rem;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-home:hover { background: #ede7f6; }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.75); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes matchPop {
      0% { transform: rotateY(180deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.12); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    .card-wrapper.matched .card {
      animation: matchPop 0.35s ease 0.1s both;
    }

    /* ── CONFETTI STARS ── */
    .star {
      position: fixed;
      pointer-events: none;
      font-size: 1.4rem;
      animation: fall linear forwards;
      z-index: 99;
    }

    @keyframes fall {
      from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- TITLE SCREEN -->
  <div id="title-screen">
    <div class="game-logo">🌸 Aya's Flip<br>&amp; Matching</div>
    <div class="subtitle">Flip the cards and find the matching pairs! 🎀</div>

    <div class="card-preview">
      <div class="preview-card">🍓</div>
      <div class="preview-card">🐱</div>
      <div class="preview-card">🦋</div>
      <div class="preview-card">🍊</div>
    </div>

    <div class="section-label">Choose Grid Size</div>
    <div class="size-grid">
      <button class="size-btn active" data-cols="2" data-rows="2">
        2×2
        <span class="size-sub">4 cards</span>
      </button>
      <button class="size-btn" data-cols="4" data-rows="4">
        4×4
        <span class="size-sub">16 cards</span>
      </button>
      <button class="size-btn" data-cols="4" data-rows="6">
        4×6
        <span class="size-sub">24 cards</span>
      </button>
      <button class="size-btn" data-cols="6" data-rows="6">
        6×6
        <span class="size-sub">36 cards</span>
      </button>
    </div>

    <button class="start-btn" id="start-btn">Let's Play! 🎉</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <div class="game-header">
      <div class="game-title-small">🌸 Aya's Match</div>
      <div class="timer-box">
        <span class="timer-icon">⏱</span>
        <span id="timer-display">0:00</span>
      </div>
      <button class="restart-btn" id="restart-btn">↩ Restart</button>
    </div>
    <div class="match-counter" id="match-counter">0 / 0 pairs</div>
    <div id="card-grid"></div>
  </div>

  <!-- WIN OVERLAY -->
  <div id="win-overlay">
    <div class="win-card">
      <div class="win-emoji">🎊</div>
      <div class="win-title">You did it, Aya!</div>
      <div class="win-subtitle">All pairs matched! Amazing job! 🌟</div>
      <div class="win-time">
        <span class="win-time-label">Your time</span>
        <span id="win-time-display">0:00</span>
      </div>
      <div class="win-actions">
        <button class="play-again-btn" id="play-again-btn">Play Again 🌸</button>
        <a class="btn-home" href="../">🏠 All Games</a>
      </div>
    </div>
  </div>

  <script>
    // ── CARD POOL ──
    const POOL = [
      '🍎','🍊','🍋','🍇','🍓','🍒','🍑','🥝','🍍','🥭',
      '🍌','🍉','🍐','🥑','🍆','🌽','🍔','🧁',
      '🐱','🐶','🐸','🐼','🐨','🦊','🐯','🦁',
      '🐮','🐷','🐙','🦋','🐢','🦄','🐬','🦒','🦓','🐘'
    ];

    // ── STATE ──
    let cols = 2, rows = 2;
    let cards = [];
    let flipped = [];
    let matchedCount = 0;
    let totalPairs = 0;
    let locked = false;
    let timerInterval = null;
    let seconds = 0;
    let timerStarted = false;

    // ── AUDIO ──
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function getAudio() {
      if (!audioCtx) audioCtx = new AudioCtx();
      return audioCtx;
    }

    function playTone(freq, duration, type = 'sine', vol = 0.18, delay = 0) {
      try {
        const ctx = getAudio();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + duration + 0.05);
      } catch (e) {}
    }

    function soundFlip() {
      playTone(440, 0.15, 'sine', 0.12);
    }

    function soundMatch() {
      playTone(523, 0.22, 'sine', 0.16);       // C5
      playTone(659, 0.28, 'sine', 0.16, 0.22); // E5
    }

    function soundWin() {
      playTone(523, 0.22, 'sine', 0.18);        // C5
      playTone(659, 0.22, 'sine', 0.18, 0.22);  // E5
      playTone(784, 0.22, 'sine', 0.18, 0.44);  // G5
      playTone(1047, 0.5, 'sine', 0.18, 0.66);  // C6
    }

    function soundNoMatch() {
      playTone(300, 0.18, 'sine', 0.1);
    }

    // ── SIZE SELECTION ──
    document.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        cols = parseInt(btn.dataset.cols);
        rows = parseInt(btn.dataset.rows);
      });
    });

    // ── START GAME ──
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('restart-btn').addEventListener('click', restartGame);
    document.getElementById('play-again-btn').addEventListener('click', () => {
      document.getElementById('win-overlay').classList.remove('show');
      showTitleScreen();
    });

    function startGame() {
      document.getElementById('title-screen').style.display = 'none';
      const gs = document.getElementById('game-screen');
      gs.style.display = 'flex';

      resetState();
      buildGrid();
    }

    function restartGame() {
      resetState();
      buildGrid();
    }

    function showTitleScreen() {
      document.getElementById('game-screen').style.display = 'none';
      document.getElementById('title-screen').style.display = '';
    }

    function resetState() {
      clearInterval(timerInterval);
      timerInterval = null;
      seconds = 0;
      timerStarted = false;
      flipped = [];
      matchedCount = 0;
      locked = false;
      totalPairs = (cols * rows) / 2;
      document.getElementById('timer-display').textContent = '0:00';
      document.getElementById('match-counter').textContent = `0 / ${totalPairs} pairs`;
    }

    // ── BUILD GRID ──
    function buildGrid() {
      const grid = document.getElementById('card-grid');
      grid.innerHTML = '';
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

      // pick symbols
      const count = (cols * rows) / 2;
      const symbols = shuffle([...POOL]).slice(0, count);
      const deck = shuffle([...symbols, ...symbols]);

      cards = deck.map((sym, i) => ({ id: i, symbol: sym, el: null }));

      cards.forEach(card => {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.innerHTML = `
          <div class="card">
            <div class="card-face card-back">
              <div class="card-back-pattern">✨</div>
            </div>
            <div class="card-face card-front">${card.symbol}</div>
          </div>
        `;
        wrapper.addEventListener('click', () => onCardClick(card, wrapper));
        card.el = wrapper;
        grid.appendChild(wrapper);
      });
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // ── CARD CLICK ──
    function onCardClick(card, wrapper) {
      if (locked) return;
      if (wrapper.classList.contains('flipped')) return;
      if (wrapper.classList.contains('matched')) return;

      // Start timer on first flip
      if (!timerStarted) {
        timerStarted = true;
        timerInterval = setInterval(tickTimer, 1000);
      }

      wrapper.classList.add('flipped');
      soundFlip();
      flipped.push({ card, wrapper });

      if (flipped.length === 2) {
        locked = true;
        checkMatch();
      }
    }

    function checkMatch() {
      const [a, b] = flipped;
      if (a.card.symbol === b.card.symbol) {
        // Match!
        setTimeout(() => {
          a.wrapper.classList.add('matched');
          b.wrapper.classList.add('matched');
          matchedCount++;
          document.getElementById('match-counter').textContent = `${matchedCount} / ${totalPairs} pairs`;
          soundMatch();
          flipped = [];
          locked = false;
          if (matchedCount === totalPairs) {
            setTimeout(onWin, 400);
          }
        }, 300);
      } else {
        // No match
        soundNoMatch();
        setTimeout(() => {
          a.wrapper.classList.remove('flipped');
          b.wrapper.classList.remove('flipped');
          flipped = [];
          locked = false;
        }, 800);
      }
    }

    // ── TIMER ──
    function tickTimer() {
      seconds++;
      document.getElementById('timer-display').textContent = formatTime(seconds);
    }

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    // ── WIN ──
    function onWin() {
      clearInterval(timerInterval);
      timerInterval = null;
      soundWin();
      document.getElementById('win-time-display').textContent = formatTime(seconds);
      document.getElementById('win-overlay').classList.add('show');
      launchConfetti();
    }

    function launchConfetti() {
      const emojis = ['🌸','⭐','🎀','✨','🌟','💖','🎊','🌺'];
      for (let i = 0; i < 28; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'star';
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          el.style.left = Math.random() * 100 + 'vw';
          el.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
          const dur = 2.5 + Math.random() * 2;
          el.style.animationDuration = dur + 's';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), dur * 1000 + 100);
        }, i * 80);
      }
    }
  </script>
</body>
</html>
