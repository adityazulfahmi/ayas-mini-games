<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aya's Tic-Tac-Toe 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg1: #fce4ec;
      --bg2: #ede7f6;
      --card-front: #fff8fc;
      --btn-primary: #f06292;
      --btn-hover: #e91e8c;
      --text-main: #6a1b9a;
      --text-sub: #9c4dcc;
      --p1-color: #f06292;
      --p1-bg: #fce4ec;
      --p2-color: #9c4dcc;
      --p2-bg: #ede7f6;
      --cell-border: #e1bee7;
      --win-glow: #80cbc4;
      --shadow: 0 4px 20px rgba(156, 77, 204, 0.18);
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ── TITLE SCREEN ── */
    #title-screen {
      text-align: center;
      max-width: 420px;
      width: 100%;
      animation: fadeIn 0.6s ease;
    }

    .game-logo {
      font-size: clamp(2.2rem, 8vw, 3.2rem);
      font-family: 'Fredoka One', cursive;
      color: var(--text-main);
      line-height: 1.15;
      text-shadow: 2px 3px 0 #f8bbd0, 4px 6px 0 rgba(206,147,216,0.3);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: clamp(0.9rem, 3.5vw, 1.05rem);
      color: var(--text-sub);
      margin-bottom: 32px;
      font-weight: 600;
    }

    .preview-board {
      display: grid;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
      gap: 6px;
      justify-content: center;
      margin: 0 auto 32px;
    }

    .preview-cell {
      background: white;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: var(--shadow);
      animation: bounce 1.8s ease infinite;
    }
    .preview-cell:nth-child(2) { animation-delay: 0.15s; }
    .preview-cell:nth-child(5) { animation-delay: 0.3s; }
    .preview-cell:nth-child(9) { animation-delay: 0.45s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    .section-label {
      font-size: 0.82rem;
      color: var(--text-sub);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
    }

    .name-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .player-input-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .player-label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .player-label.p1 { color: var(--p1-color); }
    .player-label.p2 { color: var(--p2-color); }

    .player-input {
      padding: 10px 12px;
      border: 2.5px solid #e1bee7;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-main);
      background: white;
      outline: none;
      transition: border-color 0.2s;
    }

    .player-input:focus { border-color: var(--btn-primary); }

    .start-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, #f06292, #ce93d8);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.4rem;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(240, 98, 146, 0.4);
      transition: all 0.2s ease;
    }

    .start-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(240, 98, 146, 0.5);
    }

    /* ── GAME SCREEN ── */
    #game-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 440px;
      animation: fadeIn 0.5s ease;
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 20px;
      gap: 8px;
    }

    .game-title-small {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1rem, 4vw, 1.2rem);
      color: var(--text-main);
    }

    .restart-btn {
      padding: 8px 16px;
      border: 2px solid var(--btn-primary);
      border-radius: 14px;
      background: white;
      color: var(--btn-primary);
      font-family: 'Fredoka One', cursive;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .restart-btn:hover { background: var(--btn-primary); color: white; }

    /* scoreboard */
    .scoreboard {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      width: 100%;
      margin-bottom: 18px;
      align-items: center;
    }

    .score-card {
      background: white;
      border-radius: 16px;
      padding: 10px 14px;
      text-align: center;
      box-shadow: var(--shadow);
      border: 2.5px solid transparent;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .score-card.active-p1 { border-color: var(--p1-color); box-shadow: 0 4px 16px rgba(240,98,146,0.25); }
    .score-card.active-p2 { border-color: var(--p2-color); box-shadow: 0 4px 16px rgba(156,77,204,0.25); }

    .score-symbol { font-size: 1.5rem; }
    .score-name {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 2px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score-val {
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      color: var(--text-main);
    }

    .vs-badge {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: var(--text-sub);
      text-align: center;
    }

    /* status */
    .status-bar {
      width: 100%;
      text-align: center;
      margin-bottom: 14px;
      min-height: 36px;
    }

    .status-text {
      display: inline-block;
      padding: 7px 20px;
      border-radius: 20px;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      background: white;
      color: var(--text-main);
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }

    .status-text.p1-turn { background: var(--p1-bg); color: var(--p1-color); }
    .status-text.p2-turn { background: var(--p2-bg); color: var(--p2-color); }
    .status-text.winner  { background: #e0f7fa; color: #00897b; }
    .status-text.draw    { background: #f5f5f5; color: #757575; }

    /* board */
    #board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: clamp(8px, 2vw, 12px);
      width: 100%;
      max-width: 380px;
      aspect-ratio: 1;
    }

    .cell {
      background: white;
      border-radius: clamp(12px, 3vw, 18px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2rem, 8vw, 3.2rem);
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(156,77,204,0.12);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      transform: scale(1.05);
      box-shadow: 0 6px 18px rgba(240,98,146,0.25);
    }

    .cell.taken { cursor: default; }

    .cell.p1 { background: var(--p1-bg); }
    .cell.p2 { background: var(--p2-bg); }

    .cell.winning {
      background: #e0f7fa;
      box-shadow: 0 0 0 3px var(--win-glow), 0 6px 20px rgba(128,203,196,0.4);
      animation: winPulse 0.5s ease;
    }

    .cell.pop { animation: cellPop 0.3s cubic-bezier(0.34,1.56,0.64,1); }

    @keyframes cellPop {
      from { transform: scale(0.6); }
      to   { transform: scale(1); }
    }

    @keyframes winPulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* ── WIN OVERLAY ── */
    #win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(243,229,245,0.95);
      z-index: 100;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.4s ease;
    }

    #win-overlay.show { display: flex; }

    .win-card {
      background: white;
      border-radius: 28px;
      padding: clamp(28px, 6vw, 44px);
      text-align: center;
      box-shadow: 0 12px 48px rgba(156,77,204,0.25);
      max-width: 360px;
      width: 90%;
      animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }

    .win-emoji { font-size: 3.5rem; margin-bottom: 8px; }
    .win-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.5rem, 6vw, 2rem);
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .win-sub {
      color: var(--text-sub);
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .win-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-again {
      padding: 12px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #f06292, #ce93d8);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(240,98,146,0.4);
      transition: all 0.2s;
    }

    .btn-again:hover { transform: translateY(-2px); }

    .btn-menu {
      padding: 12px;
      border: 2px solid #ce93d8;
      border-radius: 16px;
      background: white;
      color: var(--text-main);
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-menu:hover { background: #ede7f6; }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.75); }
      to   { opacity: 1; transform: scale(1); }
    }

    .star {
      position: fixed;
      pointer-events: none;
      font-size: 1.3rem;
      animation: fall linear forwards;
      z-index: 99;
    }

    @keyframes fall {
      from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      to   { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- TITLE SCREEN -->
  <div id="title-screen">
    <div class="game-logo">🌸 Aya's<br>Tic-Tac-Toe</div>
    <div class="subtitle">Two players, one winner! Ready to play? 🎀</div>

    <div class="preview-board">
      <div class="preview-cell"></div>
      <div class="preview-cell">🐱</div>
      <div class="preview-cell"></div>
      <div class="preview-cell">🐰</div>
      <div class="preview-cell">🐱</div>
      <div class="preview-cell">🐰</div>
      <div class="preview-cell"></div>
      <div class="preview-cell">🐰</div>
      <div class="preview-cell"></div>
    </div>

    <div class="section-label">Player Names</div>
    <div class="name-inputs">
      <div class="player-input-wrap">
        <label class="player-label p1">🐱 Player 1</label>
        <input class="player-input" id="name1" type="text" placeholder="Aya" maxlength="12" />
      </div>
      <div class="player-input-wrap">
        <label class="player-label p2">🐰 Player 2</label>
        <input class="player-input" id="name2" type="text" placeholder="Friend" maxlength="12" />
      </div>
    </div>

    <button class="start-btn" id="start-btn">Let's Play! 🎉</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <div class="game-header">
      <div class="game-title-small">🐱 Tic-Tac-Toe</div>
      <button class="restart-btn" id="restart-btn">↩ Restart</button>
    </div>

    <div class="scoreboard">
      <div class="score-card active-p1" id="score-p1">
        <div class="score-symbol">🐱</div>
        <div class="score-name" id="label-p1">Player 1</div>
        <div class="score-val" id="val-p1">0</div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="score-card" id="score-p2">
        <div class="score-symbol">🐰</div>
        <div class="score-name" id="label-p2">Player 2</div>
        <div class="score-val" id="val-p2">0</div>
      </div>
    </div>

    <div class="status-bar">
      <span class="status-text p1-turn" id="status">🐱 Player 1's turn</span>
    </div>

    <div id="board"></div>
  </div>

  <!-- WIN OVERLAY -->
  <div id="win-overlay">
    <div class="win-card">
      <div class="win-emoji" id="win-emoji">🎊</div>
      <div class="win-title" id="win-title">Player 1 wins!</div>
      <div class="win-sub" id="win-sub">Amazing move! 🌟</div>
      <div class="win-actions">
        <button class="btn-again" id="play-again-btn">Play Again</button>
        <button class="btn-menu" id="menu-btn">Menu</button>
      </div>
    </div>
  </div>

  <script>
    // ── STATE ──
    let board = Array(9).fill(null);
    let currentPlayer = 1; // 1 or 2
    let scores = [0, 0];
    let names = ['Player 1', 'Player 2'];
    let gameOver = false;

    const WINNING_LINES = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diags
    ];

    // ── AUDIO ──
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function getAudio() {
      if (!audioCtx) audioCtx = new AudioCtx();
      return audioCtx;
    }

    function playTone(freq, duration, type = 'sine', vol = 0.15, delay = 0) {
      try {
        const ctx = getAudio();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + duration + 0.05);
      } catch (e) {}
    }

    function soundPlace()  { playTone(520, 0.12, 'sine', 0.13); }
    function soundWin()    { playTone(523, 0.2, 'sine', 0.16); playTone(659, 0.2, 'sine', 0.16, 0.2); playTone(784, 0.35, 'sine', 0.16, 0.4); }
    function soundDraw()   { playTone(350, 0.25, 'sine', 0.12); playTone(300, 0.3, 'sine', 0.1, 0.25); }

    // ── SETUP ──
    document.getElementById('start-btn').addEventListener('click', () => {
      names[0] = document.getElementById('name1').value.trim() || 'Player 1';
      names[1] = document.getElementById('name2').value.trim() || 'Player 2';
      document.getElementById('label-p1').textContent = names[0];
      document.getElementById('label-p2').textContent = names[1];
      document.getElementById('title-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'flex';
      scores = [0, 0];
      updateScores();
      newGame();
    });

    document.getElementById('restart-btn').addEventListener('click', newGame);

    document.getElementById('play-again-btn').addEventListener('click', () => {
      document.getElementById('win-overlay').classList.remove('show');
      newGame();
    });

    document.getElementById('menu-btn').addEventListener('click', () => {
      document.getElementById('win-overlay').classList.remove('show');
      document.getElementById('game-screen').style.display = 'none';
      document.getElementById('title-screen').style.display = '';
    });

    // Allow Enter key to start
    document.getElementById('name1').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('start-btn').click(); });
    document.getElementById('name2').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('start-btn').click(); });

    // ── GAME ──
    function newGame() {
      board = Array(9).fill(null);
      currentPlayer = 1;
      gameOver = false;
      renderBoard();
      updateStatus();
      updateActiveCard();
    }

    function renderBoard() {
      const el = document.getElementById('board');
      el.innerHTML = '';
      board.forEach((_, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.i = i;
        cell.addEventListener('click', onCellClick);
        el.appendChild(cell);
      });
    }

    function onCellClick(e) {
      const i = parseInt(e.currentTarget.dataset.i);
      if (gameOver || board[i]) return;

      board[i] = currentPlayer;
      const cell = e.currentTarget;
      cell.textContent = currentPlayer === 1 ? '🐱' : '🐰';
      cell.classList.add('taken', currentPlayer === 1 ? 'p1' : 'p2', 'pop');
      soundPlace();

      const win = checkWin();
      if (win) {
        highlightWin(win);
        scores[currentPlayer - 1]++;
        updateScores();
        setTimeout(() => showWinOverlay(false), 500);
        return;
      }

      if (board.every(v => v !== null)) {
        gameOver = true;
        soundDraw();
        const st = document.getElementById('status');
        st.textContent = "It's a draw! 🤝";
        st.className = 'status-text draw';
        setTimeout(() => showWinOverlay(true), 500);
        return;
      }

      currentPlayer = currentPlayer === 1 ? 2 : 1;
      updateStatus();
      updateActiveCard();
    }

    function checkWin() {
      for (const line of WINNING_LINES) {
        const [a, b, c] = line;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return line;
      }
      return null;
    }

    function highlightWin(line) {
      gameOver = true;
      soundWin();
      const cells = document.getElementById('board').children;
      line.forEach(i => cells[i].classList.add('winning'));
      const st = document.getElementById('status');
      const sym = currentPlayer === 1 ? '🐱' : '🐰';
      st.textContent = `${sym} ${names[currentPlayer - 1]} wins!`;
      st.className = 'status-text winner';
    }

    function showWinOverlay(isDraw) {
      const overlay = document.getElementById('win-overlay');
      if (isDraw) {
        document.getElementById('win-emoji').textContent = '🤝';
        document.getElementById('win-title').textContent = "It's a Draw!";
        document.getElementById('win-sub').textContent = 'Great game, both of you! 💖';
      } else {
        const sym = currentPlayer === 1 ? '🐱' : '🐰';
        document.getElementById('win-emoji').textContent = sym;
        document.getElementById('win-title').textContent = `${names[currentPlayer - 1]} wins!`;
        document.getElementById('win-sub').textContent = 'Incredible! You\'re amazing! 🌟';
        launchConfetti();
      }
      overlay.classList.add('show');
    }

    function updateStatus() {
      const st = document.getElementById('status');
      const sym = currentPlayer === 1 ? '🐱' : '🐰';
      st.textContent = `${sym} ${names[currentPlayer - 1]}'s turn`;
      st.className = `status-text ${currentPlayer === 1 ? 'p1-turn' : 'p2-turn'}`;
    }

    function updateActiveCard() {
      document.getElementById('score-p1').className = `score-card${currentPlayer === 1 ? ' active-p1' : ''}`;
      document.getElementById('score-p2').className = `score-card${currentPlayer === 2 ? ' active-p2' : ''}`;
    }

    function updateScores() {
      document.getElementById('val-p1').textContent = scores[0];
      document.getElementById('val-p2').textContent = scores[1];
    }

    function launchConfetti() {
      const emojis = ['🐱','🐰','🎀','✨','🌟','💖','🎊'];
      for (let i = 0; i < 22; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'star';
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          el.style.left = Math.random() * 100 + 'vw';
          el.style.fontSize = (1 + Math.random()) + 'rem';
          const dur = 2.2 + Math.random() * 1.8;
          el.style.animationDuration = dur + 's';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), dur * 1000 + 100);
        }, i * 90);
      }
    }
  </script>
</body>
</html>
